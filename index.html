<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담 신청</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e; --paper: #f5f0e8; --accent: #c0392b; --accent2: #2980b9;
    --muted: #8c7b6e; --border: #d4c9ba; --card: #fffdf8;
    --lunch: #e8f4fd; --after: #fdf3e8;
    --lunch-accent: #2980b9; --after-accent: #e67e22;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'Pretendard', sans-serif; min-height: 100vh; }

  header { background: var(--ink); padding: 0 20px; height: 60px; display: flex; align-items: center; justify-content: space-between; color: #fff; }
  .check-btn { background: none; border: 1px solid #777; color: #ccc; padding: 6px 12px; cursor: pointer; font-size: .8rem; }

  .main-wrap { max-width: 1000px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
  .calendar { border: 1.5px solid var(--border); background: var(--card); }
  .cal-head { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--ink); color: #ccc; text-align: center; font-size: .8rem; padding: 10px 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); min-height: 70px; padding: 5px; cursor: default; }
  .cal-cell.has-slot { cursor: pointer; background: #fff; }
  .cal-cell.selected { background: #e8f0fe; outline: 2px solid var(--accent2); outline-offset: -2px; }
  .slot-dot { display: inline-block; font-size: .6rem; padding: 1px 4px; border-radius: 2px; margin-right: 2px; margin-top: 2px; }
  .slot-dot.lunch { background: var(--lunch); color: var(--lunch-accent); }
  .slot-dot.after { background: var(--after); color: var(--after-accent); }

  .panel-card { background: var(--card); border: 1.5px solid var(--border); padding: 20px; margin-bottom: 20px; }
  .slot-card { border: 1.5px solid var(--border); padding: 10px; margin-bottom: 10px; cursor: pointer; background: #fff; }
  .slot-card.selected-card { border-color: var(--accent2); background: #f0f6ff; }
  .slot-card.taken { opacity: 0.4; cursor: not-allowed; }

  .form-group { margin-bottom: 10px; }
  .form-group label { display: block; font-size: .75rem; margin-bottom: 4px; color: var(--muted); }
  .form-group input, .form-group textarea { width: 100%; padding: 8px; border: 1px solid var(--border); font-family: inherit; }
  .submit-btn { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; font-weight: 700; cursor: pointer; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
  .overlay.show { display: flex; }
  .modal { background: #fff; padding: 25px; width: 340px; }
  .cancel-btn { width: 100%; padding: 8px; margin-top: 10px; border: 1px solid red; color: red; background: none; cursor: pointer; }
</style>
</head>
<body>
<header><h1>📅 상담 신청</h1><button class="check-btn" onclick="document.getElementById('check-overlay').classList.add('show')">📋 확인/취소</button></header>
<div class="main-wrap">
  <div>
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
      <button onclick="window.changeMonth(-1)">←</button><h3 id="cal-title"></h3><button onclick="window.changeMonth(1)">→</button>
    </div>
    <div class="calendar"><div class="cal-head"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div><div class="cal-grid" id="cal-grid"></div></div>
  </div>
  <div id="right-panel">
    <div class="panel-card" id="form-card" style="display:none">
      <h3 id="form-date-title" style="margin-bottom:15px"></h3>
      <div id="slot-area"></div>
      <div id="form-area" style="display:none; margin-top:15px">
        <div class="form-group"><label>이름</label><input type="text" id="f-name"></div>
        <div class="form-group"><label>상담 내용</label><textarea id="f-content" rows="2"></textarea></div>
        <div class="form-group"><label>비밀번호 (4자 이상)</label><input type="password" id="f-pw"></div>
        <button class="submit-btn" id="submit-btn" onclick="window.submitBooking()">상담 신청하기</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="check-overlay" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <h3>예약 확인/취소</h3><br>
    <div class="form-group"><label>이름</label><input type="text" id="check-name"></div>
    <div class="form-group"><label>비밀번호</label><input type="password" id="check-pw"></div>
    <button class="submit-btn" onclick="window.doCheck()">확인</button>
    <div id="check-result" style="margin-top:15px; border-top:1px solid #eee; padding-top:10px; display:none"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDFGcLsVUPWrczjPyT4caEg1o7zdKGN-b8",
    authDomain: "my-counsel-9b532.firebaseapp.com",
    projectId: "my-counsel-9b532",
    storageBucket: "my-counsel-9b532.firebasestorage.app",
    messagingSenderId: "51705550332",
    appId: "1:51705550332:web:67766fdeb1214524190e79"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const SLOT_DEF = { lunch: { label:'점심 상담', time:'12:40 – 13:00' }, after: { label:'방과후 상담', time:'15:10 – 15:30' } };
let curYear, curMonth, selDate = null, selType = null, slotsCache = {}, bookingsCache = {};

async function init() {
    const now = new Date(); curYear = now.getFullYear(); curMonth = now.getMonth();
    onSnapshot(collection(db, 'slots'), snap => { slotsCache = {}; snap.forEach(d => slotsCache[d.id] = d.data()); renderCal(); if(selDate) renderRight(selDate); });
    onSnapshot(collection(db, 'bookings'), snap => {
        bookingsCache = {}; snap.forEach(d => { const b = { id: d.id, ...d.data() }; if(!bookingsCache[b.date]) bookingsCache[b.date] = []; bookingsCache[b.date].push(b); });
        renderCal(); if(selDate) renderRight(selDate);
    });
}

function renderCal() {
    document.getElementById('cal-title').textContent = `${curYear}년 ${curMonth+1}월`;
    const grid = document.getElementById('cal-grid'); grid.innerHTML = '';
    const firstDay = new Date(curYear, curMonth, 1).getDay();
    const lastDate = new Date(curYear, curMonth+1, 0).getDate();
    for(let i=0; i<firstDay; i++) grid.innerHTML += '<div class="cal-cell empty"></div>';
    for(let d=1; d<=lastDate; d++) {
        const key = `${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const s = slotsCache[key] || {};
        const cell = document.createElement('div');
        cell.className = `cal-cell ${key === selDate ? 'selected' : ''} ${s.lunch||s.after ? 'has-slot' : ''}`;
        if(s.lunch||s.after) cell.onclick = () => { selDate = key; selType = null; renderCal(); renderRight(key); };
        cell.innerHTML = `<div>${d}</div>`;
        if(s.lunch) cell.innerHTML += `<span class="slot-dot lunch">점심</span>`;
        if(s.after) cell.innerHTML += `<span class="slot-dot after">방과후</span>`;
        grid.appendChild(cell);
    }
}

function renderRight(key) {
    document.getElementById('form-card').style.display = 'block';
    document.getElementById('form-date-title').textContent = key;
    const slotInfo = slotsCache[key] || {};
    const dayBooks = bookingsCache[key] || [];
    const area = document.getElementById('slot-area'); area.innerHTML = '';
    ['lunch','after'].forEach(type => {
        if(!slotInfo[type]) return;
        const taken = dayBooks.some(b => b.type === type);
        const card = document.createElement('div');
        card.className = `slot-card ${selType === type ? 'selected-card' : ''} ${taken ? 'taken' : ''}`;
        card.innerHTML = `<b>${SLOT_DEF[type].label}</b><br><small>${SLOT_DEF[type].time}</small> ${taken?'(마감)':'(신청가능)'}`;
        if(!taken) card.onclick = () => { selType = type; renderRight(key); document.getElementById('form-area').style.display='block'; };
        area.appendChild(card);
    });
}

window.submitBooking = async () => {
    const btn = document.getElementById('submit-btn');
    const name = document.getElementById('f-name').value.trim();
    const content = document.getElementById('f-content').value.trim();
    const pw = document.getElementById('f-pw').value;
    if(!selType || !name || pw.length < 4) { alert('이름과 비밀번호(4자 이상)를 입력하세요.'); return; }
    
    btn.disabled = true; btn.textContent = '처리 중...';
    await addDoc(collection(db, 'bookings'), { date: selDate, type: selType, name, content, pw: simpleHash(pw), createdAt: Date.now() });
    alert('예약 완료되었습니다.');
    location.reload();
};

window.doCheck = () => {
    const name = document.getElementById('check-name').value;
    const pw = simpleHash(document.getElementById('check-pw').value);
    const res = document.getElementById('check-result');
    const found = [];
    Object.values(bookingsCache).forEach(arr => arr.forEach(b => { if(b.name===name && b.pw===pw) found.push(b); }));
    if(!found.length) alert('정보가 일치하지 않습니다.');
    else {
        res.style.display = 'block';
        res.innerHTML = found.map(b => `<div>${b.date} (${b.type==='lunch'?'점심':'방과후'}) <button class="cancel-btn" onclick="window.cancelB('${b.id}')">취소</button></div>`).join('');
    }
};

window.cancelB = async (id) => { if(confirm('정말 취소하시겠습니까?')) { await deleteDoc(doc(db, 'bookings', id)); alert('취소되었습니다.'); location.reload(); } };
window.changeMonth = (dir) => { curMonth += dir; if(curMonth>11){curMonth=0;curYear++;}else if(curMonth<0){curMonth=11;curYear--;} renderCal(); };
function simpleHash(str) { let h = 0; for(let i=0; i<str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0; return h.toString(36); }
init();
</script>
</body>
</html>
