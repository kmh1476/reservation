<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담 신청</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e; --paper: #f5f0e8; --accent: #c0392b; --accent2: #2980b9;
    --muted: #8c7b6e; --border: #d4c9ba; --card: #fffdf8;
    --lunch: #e8f4fd; --after: #fdf3e8;
    --lunch-accent: #2980b9; --after-accent: #e67e22; --open: #27ae60;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'Pretendard', sans-serif; min-height: 100vh; }

  /* 로딩 */
  #loading-screen {
    position: fixed; inset: 0; background: var(--ink);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 999; transition: opacity .4s;
  }
  #loading-screen.hide { opacity: 0; pointer-events: none; }
  .loading-logo { font-family: 'Nanum Myeongjo', serif; color: #fff; font-size: 1.4rem; margin-bottom: 20px; }
  .loading-spinner { width: 32px; height: 32px; border: 3px solid #333; border-top-color: var(--accent2); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-err { color: #f88; font-size: .82rem; margin-top: 20px; max-width: 300px; text-align: center; line-height: 1.6; display: none; white-space: pre-wrap; }

  header { background: var(--ink); padding: 0 40px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-family: 'Nanum Myeongjo', serif; font-size: 1.2rem; color: #fff; }
  .check-btn { background: none; border: 1px solid #777; color: #ccc; padding: 7px 16px; cursor: pointer; font-size: .82rem; font-family: 'Pretendard', sans-serif; transition: all .2s; }
  .check-btn:hover { border-color: #fff; color: #fff; }

  .main-wrap { max-width: 1000px; margin: 0 auto; padding: 40px 24px; display: grid; grid-template-columns: 1fr 360px; gap: 32px; }

  /* 달력 */
  .cal-nav { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .cal-nav h2 { font-family:'Nanum Myeongjo',serif; font-size:1.4rem; flex:1; }
  .nav-btn { background: none; border: 1.5px solid var(--border); width:34px; height:34px; cursor:pointer; font-size:1rem; color:var(--ink); transition: all .2s; display:flex; align-items:center; justify-content:center; }
  .nav-btn:hover { background:var(--ink); color:#fff; border-color:var(--ink); }
  .calendar { border:1.5px solid var(--border); background:var(--card); overflow:hidden; }
  .cal-head { display:grid; grid-template-columns:repeat(7,1fr); background:var(--ink); }
  .cal-head span { text-align:center; padding:10px 0; color:#ccc; font-size:.78rem; font-weight:500; letter-spacing:.06em; }
  .cal-head span:first-child { color:#e88; } .cal-head span:last-child { color:#88e; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); }
  .cal-cell { border-right:1px solid var(--border); border-bottom:1px solid var(--border); min-height:80px; padding:7px; cursor:default; }
  .cal-cell:nth-child(7n){ border-right:none; }
  .cal-cell.empty { background:#f0ebe3; }
  .cal-cell.has-slot { cursor:pointer; }
  .cal-cell.has-slot:hover { background:#eee8dc; }
  .cal-cell.selected { background:#e8f0fe; outline:2px solid var(--accent2); outline-offset:-2px; }
  .cal-cell.today { background:#fef9f0; }
  .cal-cell.past { opacity:.55; cursor:default; }
  .cell-date { font-size:.75rem; font-weight:600; color:var(--muted); margin-bottom:5px; }
  .cal-cell.sun .cell-date { color:#c0392b; } .cal-cell.sat .cell-date { color:#2980b9; }
  .cal-cell.today .cell-date { color:var(--ink); font-weight:800; }
  .slot-dot { display:inline-block; font-size:.63rem; font-weight:700; padding:2px 5px; border-radius:2px; margin-bottom:2px; margin-right:2px; }
  .slot-dot.lunch { background:var(--lunch); color:var(--lunch-accent); }
  .slot-dot.after  { background:var(--after); color:var(--after-accent); }

  /* 패널 */
  .panel-card { background:var(--card); border:1.5px solid var(--border); padding:24px; margin-bottom:20px; }
  .panel-card h3 { font-family:'Nanum Myeongjo',serif; font-size:1.05rem; margin-bottom:4px; }
  .panel-sub { font-size:.8rem; color:var(--muted); margin-bottom:18px; }

  /* 슬롯 카드 */
  .slot-cards { display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
  .slot-card { border:2px solid var(--border); padding:14px 16px; cursor:pointer; transition:all .2s; background:var(--paper); display:flex; align-items:center; justify-content:space-between; }
  .slot-card:hover:not(.taken):not(.past-slot){ border-color:var(--accent2); background:#f0f6ff; }
  .slot-card.selected-card.lunch-card { border-color:var(--lunch-accent); background:var(--lunch); }
  .slot-card.selected-card.after-card  { border-color:var(--after-accent); background:var(--after); }
  .slot-card.taken { opacity:.5; cursor:default; background:#f0ebe3; }
  .slot-card.past-slot { opacity:.45; cursor:default; }
  .slot-card-name { font-size:.95rem; font-weight:700; margin-bottom:3px; }
  .slot-card-name.lunch { color:var(--lunch-accent); } .slot-card-name.after { color:var(--after-accent); }
  .slot-card-time { font-size:.8rem; color:var(--muted); }
  .slot-card-status { font-size:.72rem; font-weight:700; padding:3px 9px; border-radius:2px; letter-spacing:.04em; }
  .slot-card-status.available { background:#e8f8f0; color:var(--open); }
  .slot-card-status.taken-badge { background:#f0ebe3; color:#aaa; }
  .slot-card-status.past-badge  { background:#f0ebe3; color:#bbb; }
  .slot-card-status.selected-badge { background:var(--accent2); color:#fff; }

  /* 폼 */
  .form-group { margin-bottom:12px; }
  .form-group label { display:block; font-size:.78rem; font-weight:600; color:var(--muted); margin-bottom:5px; letter-spacing:.03em; }
  .form-group input, .form-group textarea { width:100%; padding:10px 12px; border:1.5px solid var(--border); background:var(--paper); font-family:'Pretendard',sans-serif; font-size:.9rem; color:var(--ink); outline:none; transition:border-color .2s; resize:none; }
  .form-group input:focus, .form-group textarea:focus { border-color:var(--accent2); }
  .submit-btn { width:100%; padding:12px; background:var(--accent); color:#fff; border:none; cursor:pointer; font-family:'Pretendard',sans-serif; font-size:.92rem; font-weight:700; letter-spacing:.04em; transition:opacity .2s; margin-top:4px; }
  .submit-btn:hover { opacity:.85; } .submit-btn:disabled { opacity:.4; cursor:default; }
  .form-msg { font-size:.8rem; margin-top:8px; text-align:center; line-height:1.5; }
  .form-msg.ok { color:var(--open); } .form-msg.err { color:var(--accent); }

  /* 모달 */
  .overlay { display:none; position:fixed; inset:0; background:rgba(26,26,46,.65); z-index:100; align-items:center; justify-content:center; }
  .overlay.show { display:flex; }
  .modal { background:var(--card); border:1.5px solid var(--border); width:380px; max-width:calc(100vw - 32px); padding:32px 28px; position:relative; animation:fadeUp .25s ease; }
  @keyframes fadeUp { from{transform:translateY(16px);opacity:0} to{transform:none;opacity:1} }
  .modal h3 { font-family:'Nanum Myeongjo',serif; font-size:1.1rem; margin-bottom:6px; }
  .modal .modal-sub { font-size:.8rem; color:var(--muted); margin-bottom:20px; }
  .modal-close { position:absolute; top:14px; right:16px; background:none; border:none; font-size:1.3rem; cursor:pointer; color:var(--muted); line-height:1; transition:color .2s; }
  .modal-close:hover { color:var(--ink); }
  .check-result { background:var(--paper); border:1.5px solid var(--border); padding:16px; margin-top:14px; display:none; }
  .check-result.show { display:block; }
  .result-label { font-size:.75rem; color:var(--muted); margin-bottom:3px; }
  .result-val { font-size:.95rem; font-weight:600; margin-bottom:10px; }
  .result-val:last-child { margin-bottom:0; }
  .result-type { display:inline-block; padding:2px 8px; font-size:.7rem; font-weight:700; border-radius:2px; margin-left:6px; }
  .result-type.lunch { background:var(--lunch); color:var(--lunch-accent); }
  .result-type.after { background:var(--after); color:var(--after-accent); }
  .no-slot-msg { text-align:center; padding:28px; color:var(--muted); font-size:.88rem; line-height:1.7; }

  @media(max-width:720px){
    .main-wrap { grid-template-columns:1fr; }
    header { padding:0 16px; }
    .cal-cell { min-height:56px; }
  }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loading-logo">📅 상담 신청</div>
  <div class="loading-spinner"></div>
  <div class="loading-err" id="loading-err"></div>
</div>

<header>
  <h1>📅 학생 상담 신청</h1>
  <button class="check-btn" onclick="openCheckModal()">📋 상담 확인</button>
</header>

<div class="main-wrap">
  <div>
    <div class="cal-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
      <h2 id="cal-title"></h2>
      <button class="nav-btn" onclick="changeMonth(1)">&#8594;</button>
    </div>
    <div class="calendar">
      <div class="cal-head">
        <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <p style="font-size:.78rem;color:var(--muted);margin-top:12px;line-height:1.7;">
      🔵 <b>점심</b>(12:40–13:00) · 🟠 <b>방과후</b>(15:10–15:30) 표시된 날만 신청 가능합니다.
    </p>
  </div>

  <div id="right-panel">
    <div class="panel-card" id="no-select-card">
      <div class="no-slot-msg">📌 달력에서 상담이 열린 날짜를<br>클릭하면 신청할 수 있습니다.</div>
    </div>
    <div class="panel-card" id="form-card" style="display:none">
      <h3 id="form-date-title"></h3>
      <p class="panel-sub">시간대를 선택하고 아래 정보를 입력해주세요.</p>
      <div id="slot-area"></div>
      <div id="form-area" style="display:none; margin-top:4px;">
        <div class="form-group">
          <label>이름</label>
          <input type="text" id="f-name" placeholder="이름을 입력하세요">
        </div>
        <div class="form-group">
          <label>상담 내용</label>
          <textarea id="f-content" rows="3" placeholder="상담하고 싶은 내용을 간단히 적어주세요."></textarea>
        </div>
        <div class="form-group">
          <label>비밀번호 <span style="font-weight:300;font-size:.72rem">(상담 확인 시 사용)</span></label>
          <input type="password" id="f-pw" placeholder="숫자 또는 문자 4자 이상">
        </div>
        <button class="submit-btn" id="submit-btn" onclick="submitBooking()">상담 신청하기</button>
        <div class="form-msg" id="form-msg"></div>
      </div>
    </div>
  </div>
</div>

<!-- 상담 확인 모달 -->
<div class="overlay" id="check-overlay" onclick="closeCheckModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeCheckModalDirect()">✕</button>
    <h3>상담 확인</h3>
    <p class="modal-sub">이름과 비밀번호를 입력하면 신청된 상담 일정을 알려드립니다.</p>
    <div class="form-group">
      <label>이름</label>
      <input type="text" id="check-name" placeholder="이름">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="check-pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doCheck()">
    </div>
    <button class="submit-btn" onclick="doCheck()">확인하기</button>
    <div class="check-result" id="check-result"></div>
  </div>
</div>

<script type="module">
import { initializeApp }      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ════════════════════════════════════════════════════════
//  ★ 아래 firebaseConfig 를 본인 것으로 교체하세요 ★
// ════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyDFGcLsVUPWrczjPyT4caEg1o7zdKGN-b8",
  authDomain: "my-counsel-9b532.firebaseapp.com",
  projectId: "my-counsel-9b532",
  storageBucket: "my-counsel-9b532.firebasestorage.app",
  messagingSenderId: "51705550332",
  appId: "1:51705550332:web:67766fdeb1214524190e79"
};
// ════════════════════════════════════════════════════════

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const SLOT_DEF = {
  lunch: { label:'점심 상담', time:'12:40 – 13:00' },
  after: { label:'방과후 상담', time:'15:10 – 15:30' }
};

let curYear, curMonth;
let selDate = null, selType = null;
let slotsCache    = {};   // { "2025-06-13": {lunch:true, after:false} }
let bookingsCache  = {};   // { "2025-06-13": [{id,type,name,pw,...}] }

// ── 초기화 ──────────────────────────────────────────────
async function init(){
  try {
    const now = new Date();
    curYear  = now.getFullYear();
    curMonth = now.getMonth();

    // 슬롯 실시간 구독
    onSnapshot(collection(db, 'slots'), snap => {
      slotsCache = {};
      snap.forEach(d => { slotsCache[d.id] = d.data(); });
      renderCal();
      if(selDate) refreshRightPanel();
    });

    // 예약 실시간 구독
    onSnapshot(collection(db, 'bookings'), snap => {
      bookingsCache = {};
      snap.forEach(d => {
        const b = { id: d.id, ...d.data() };
        if(!bookingsCache[b.date]) bookingsCache[b.date] = [];
        bookingsCache[b.date].push(b);
      });
      renderCal();
      if(selDate) refreshRightPanel();
    });

    hideLoading();
  } catch(e) {
    document.getElementById('loading-err').style.display = 'block';
    document.getElementById('loading-err').textContent =
      'Firebase 연결 실패!\nfirebaseConfig를 확인해주세요.\n\n' + e.message;
  }
}

function hideLoading(){
  const s = document.getElementById('loading-screen');
  s.classList.add('hide');
  setTimeout(() => s.style.display = 'none', 500);
}

// ── 달력 ──────────────────────────────────────────────
function fmtDate(y, m, d){
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function todayStr(){
  const n = new Date();
  return fmtDate(n.getFullYear(), n.getMonth(), n.getDate());
}

window.changeMonth = function(dir){
  curMonth += dir;
  if(curMonth > 11){ curMonth = 0; curYear++; }
  if(curMonth < 0) { curMonth = 11; curYear--; }
  renderCal();
};

function renderCal(){
  document.getElementById('cal-title').textContent = `${curYear}년 ${curMonth+1}월`;
  const today    = todayStr();
  const firstDay = new Date(curYear, curMonth, 1).getDay();
  const lastDate = new Date(curYear, curMonth+1, 0).getDate();
  const grid     = document.getElementById('cal-grid');
  grid.innerHTML = '';

  for(let i = 0; i < firstDay; i++){
    const e = document.createElement('div'); e.className = 'cal-cell empty'; grid.appendChild(e);
  }
  for(let d = 1; d <= lastDate; d++){
    const key = fmtDate(curYear, curMonth, d);
    const dow = new Date(curYear, curMonth, d).getDay();
    const s   = slotsCache[key] || {};
    const hasSlot = s.lunch || s.after;
    const isPast  = key < today;

    const cell = document.createElement('div');
    cell.className = 'cal-cell'
      + (dow === 0 ? ' sun' : dow === 6 ? ' sat' : '')
      + (key === today   ? ' today'    : '')
      + (key === selDate ? ' selected' : '')
      + (isPast          ? ' past'     : '')
      + (hasSlot && !isPast ? ' has-slot' : '');
    if(hasSlot && !isPast) cell.onclick = () => selectDate(key);

    const dateEl = document.createElement('div');
    dateEl.className = 'cell-date';
    dateEl.textContent = d;
    cell.appendChild(dateEl);

    if(s.lunch){ const b=document.createElement('span'); b.className='slot-dot lunch'; b.textContent='점심'; cell.appendChild(b); }
    if(s.after){ const b=document.createElement('span'); b.className='slot-dot after'; b.textContent='방과후'; cell.appendChild(b); }
    grid.appendChild(cell);
  }
}

// ── 날짜 선택 & 오른쪽 패널 ─────────────────────────────
function selectDate(key){
  selDate = key; selType = null;
  renderCal();
  renderRightPanel(key);
}

function refreshRightPanel(){
  if(!selDate) return;
  const slot = slotsCache[selDate] || {};
  if(!slot.lunch && !slot.after){
    // 슬롯이 닫혔으면 패널 초기화
    selDate = null; selType = null;
    document.getElementById('form-card').style.display = 'none';
    document.getElementById('no-select-card').style.display = 'block';
    renderCal(); return;
  }
  renderRightPanel(selDate);
}

function renderRightPanel(key){
  const [y,m,d] = key.split('-');
  const dow = ['일','월','화','수','목','금','토'][new Date(+y,+m-1,+d).getDay()];
  document.getElementById('no-select-card').style.display = 'none';
  document.getElementById('form-card').style.display = 'block';
  document.getElementById('form-date-title').textContent = `${+y}년 ${+m}월 ${+d}일 (${dow})`;

  const slotInfo  = slotsCache[key] || {};
  const dayBooks  = bookingsCache[key] || [];
  const slotArea  = document.getElementById('slot-area');
  slotArea.innerHTML = '';

  const cards = document.createElement('div');
  cards.className = 'slot-cards';

  ['lunch','after'].forEach(type => {
    if(!slotInfo[type]) return;
    const def    = SLOT_DEF[type];
    const taken  = dayBooks.some(b => b.type === type);
    const isPast = isPastSlot(key, type);
    const isSel  = selType === type;

    const card = document.createElement('div');
    card.className = `slot-card ${type}-card`
      + (taken   ? ' taken'         : '')
      + (isPast  ? ' past-slot'     : '')
      + (isSel   ? ' selected-card' : '');

    const statusClass = taken  ? 'taken-badge'
                      : isPast ? 'past-badge'
                      : isSel  ? 'selected-badge'
                      :          'available';
    const statusText  = taken  ? '마감'
                      : isPast ? '종료'
                      : isSel  ? '선택됨'
                      :          '신청 가능';

    card.innerHTML = `
      <div>
        <div class="slot-card-name ${type}">${def.label}</div>
        <div class="slot-card-time">${def.time}</div>
      </div>
      <div class="slot-card-status ${statusClass}">${statusText}</div>`;

    if(!taken && !isPast) card.onclick = () => selectSlot(type, card);
    cards.appendChild(card);
  });

  slotArea.appendChild(cards);

  // 선택된 슬롯이 여전히 유효한지 확인
  const dayBooks2 = bookingsCache[key] || [];
  const stillOk   = selType
    && slotInfo[selType]
    && !dayBooks2.some(b => b.type === selType)
    && !isPastSlot(key, selType);

  document.getElementById('form-area').style.display = stillOk ? 'block' : 'none';
  if(!stillOk){ selType = null; clearForm(); }
}

function isPastSlot(dateKey, type){
  const cutoff = { lunch:[13,0], after:[15,30] };
  const [h, min] = cutoff[type];
  const [y,m,d]  = dateKey.split('-');
  return new Date() >= new Date(+y, +m-1, +d, h, min, 0);
}

function selectSlot(type, cardEl){
  selType = type;
  // 모든 선택 해제 후 선택된 카드 표시
  document.querySelectorAll('.slot-card').forEach(c => {
    if(c.classList.contains('taken') || c.classList.contains('past-slot')) return;
    c.classList.remove('selected-card');
    const b = c.querySelector('.slot-card-status');
    if(b){ b.className = 'slot-card-status available'; b.textContent = '신청 가능'; }
  });
  cardEl.classList.add('selected-card');
  const b = cardEl.querySelector('.slot-card-status');
  if(b){ b.className = 'slot-card-status selected-badge'; b.textContent = '선택됨'; }
  document.getElementById('form-area').style.display = 'block';
  clearMsg();
}

function clearForm(){
  ['f-name','f-content','f-pw'].forEach(id => {
    const el = document.getElementById(id); if(el) el.value = '';
  });
  clearMsg();
}
function clearMsg(){
  const m = document.getElementById('form-msg'); m.textContent = ''; m.className = 'form-msg';
}

// ── 신청 제출 ────────────────────────────────────────────
window.submitBooking = async function(){
  const name    = document.getElementById('f-name').value.trim();
  const content = document.getElementById('f-content').value.trim();
  const pw      = document.getElementById('f-pw').value;
  const msg     = document.getElementById('form-msg');
  const btn     = document.getElementById('submit-btn');

  if(!selType)       { showMsg(msg, '상담 시간대를 선택해주세요.', 'err'); return; }
  if(!name)          { showMsg(msg, '이름을 입력해주세요.', 'err'); return; }
  if(!content)       { showMsg(msg, '상담 내용을 입력해주세요.', 'err'); return; }
  if(pw.length < 4)  { showMsg(msg, '비밀번호는 4자 이상이어야 합니다.', 'err'); return; }

  const dayBooks = bookingsCache[selDate] || [];
  if(dayBooks.some(b => b.type === selType)){
    showMsg(msg, '방금 다른 학생이 신청했습니다. 다른 시간대를 선택하세요.', 'err'); return;
  }

  btn.disabled = true; btn.textContent = '신청 중...';
  try {
    await addDoc(collection(db, 'bookings'), {
      date: selDate, type: selType,
      name, content,
      pw: simpleHash(pw),
      createdAt: Date.now()
    });
    showMsg(msg, '✅ 상담이 신청되었습니다!', 'ok');
    clearForm(); selType = null;
  } catch(e){
    showMsg(msg, '오류가 발생했습니다. 다시 시도해주세요.\n' + e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = '상담 신청하기';
  }
};

// ── 상담 확인 모달 ────────────────────────────────────────
window.openCheckModal = function(){
  document.getElementById('check-overlay').classList.add('show');
  document.getElementById('check-name').value = '';
  document.getElementById('check-pw').value = '';
  const r = document.getElementById('check-result');
  r.innerHTML = ''; r.classList.remove('show');
};
window.closeCheckModal = function(e){
  if(e.target === document.getElementById('check-overlay')) closeCheckModalDirect();
};
window.closeCheckModalDirect = function(){
  document.getElementById('check-overlay').classList.remove('show');
};

window.doCheck = function(){
  const name = document.getElementById('check-name').value.trim();
  const pw   = document.getElementById('check-pw').value;
  const res  = document.getElementById('check-result');

  if(!name || !pw){
    res.innerHTML = '<p style="color:var(--accent);font-size:.83rem">이름과 비밀번호를 모두 입력해주세요.</p>';
    res.classList.add('show'); return;
  }

  const hashed  = simpleHash(pw);
  const matched = [];
  Object.values(bookingsCache).forEach(arr => {
    arr.forEach(b => { if(b.name === name && b.pw === hashed) matched.push(b); });
  });

  if(!matched.length){
    res.innerHTML = '<p style="color:var(--accent);font-size:.83rem">일치하는 상담 예약이 없습니다.<br>이름 또는 비밀번호를 확인해주세요.</p>';
    res.classList.add('show'); return;
  }

  matched.sort((a,b) => a.date.localeCompare(b.date));
  const items = matched.map(b => {
    const [y,m,d] = b.date.split('-');
    const dow = ['일','월','화','수','목','금','토'][new Date(+y,+m-1,+d).getDay()];
    const typeLabel = b.type === 'lunch' ? '점심 상담' : '방과후 상담';
    const timeStr   = b.type === 'lunch' ? '12:40 – 13:00' : '15:10 – 15:30';
    return `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
      <div class="result-label">날짜</div>
      <div class="result-val">${+y}년 ${+m}월 ${+d}일 (${dow}) <span class="result-type ${b.type}">${typeLabel}</span></div>
      <div class="result-label">시간</div>
      <div class="result-val">${timeStr}</div>
    </div>`;
  }).join('');

  res.innerHTML = `<p style="font-size:.8rem;color:var(--muted);margin-bottom:8px"><b>${esc(name)}</b>님의 상담 예약 (${matched.length}건)</p>${items}`;
  res.classList.add('show');
};

// ── 유틸 ────────────────────────────────────────────────
function simpleHash(str){
  let h = 0;
  for(let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
  return h.toString(36);
}
function showMsg(el, text, cls){ el.textContent = text; el.className = 'form-msg ' + cls; }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
