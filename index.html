<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 상담 예약</title>
    <style>
        /* (관리자 페이지와 유사한 스타일 생략/동일 적용) */
        body { font-family: sans-serif; background: #f0fdfa; padding: 15px; margin: 0; }
        .header-wrap { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; color: #0d9488; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; max-width: 500px; margin: 0 auto; background: white; padding: 15px; border-radius: 16px; }
        .day-cell { height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 10px; background: #f8fafc; opacity: 0.3; cursor: not-allowed; }
        .day-cell.available { opacity: 1; cursor: pointer; background: #ccfbf1; border: 1px solid #14b8a6; color: #0f766e; font-weight: bold; }
        /* 팝업 모달 스타일은 이전과 동일하게 유지 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 350px; padding: 20px; border-radius: 15px; }
        .slot-btn { width: 100%; padding: 10px; margin-bottom: 5px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; }
        .slot-btn.selected { background: #0d9488; color: white; }
    </style>
</head>
<body>
    <div class="header-wrap">
        <button onclick="changeMonth(-1)">◀</button>
        <h2 id="monthTitle"></h2>
        <button onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar-grid" id="calendar"></div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h3 id="modalTitle">날짜 선택</h3>
            <div id="slotArea"></div>
            <div id="formArea" style="display:none;">
                <input type="text" id="name" placeholder="학번 및 이름" style="width:100%; padding:10px; margin-bottom:5px;">
                <textarea id="memo" placeholder="상담 주제" style="width:100%; padding:10px;"></textarea>
                <button onclick="submit()" style="width:100%; padding:10px; background:#0d9488; color:white; border:none; margin-top:10px;">신청하기</button>
            </div>
            <button onclick="closeModal()" style="width:100%; margin-top:5px; border:none; background:none; color:#666;">닫기</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx1PGyMAfi4ijJ9qZFGhBtJimTGWwRm0qtOuMv6sGsaQTazeGaNQE7clMNcI0VDlAJyOg/exec";
        let activeSlots = [];
        let currentDate = new Date();
        let selDate = "", selSlot = "";

        async function loadData() {
            // URL 끝에 무작위 값을 붙여 브라우저 캐시를 무시하고 최신 데이터를 강제 로드
            const res = await fetch(`${SCRIPT_URL}?t=${Date.now()}`);
            activeSlots = await res.json();
            render();
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            render();
        }

        function render() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('monthTitle').innerText = `${year}년 ${month + 1}월`;
            const container = document.getElementById('calendar');
            container.innerHTML = "";

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            for(let i=0; i<firstDay; i++) container.appendChild(document.createElement('div'));

            for(let d=1; d<=lastDate; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                cell.innerText = d;

                const daySlots = activeSlots.filter(s => s.date === dateStr);
                if(daySlots.length > 0) {
                    cell.classList.add('available');
                    cell.onclick = () => openModal(dateStr, daySlots);
                }
                container.appendChild(cell);
            }
        }

        function openModal(date, slots) {
            selDate = date;
            document.getElementById('modalTitle').innerText = date;
            const area = document.getElementById('slotArea');
            area.innerHTML = "";
            slots.forEach(s => {
                const b = document.createElement('button');
                b.className = 'slot-btn';
                b.innerText = s.slot;
                b.onclick = () => {
                    selSlot = s.slot;
                    document.getElementById('formArea').style.display = 'block';
                    document.querySelectorAll('.slot-btn').forEach(btn => btn.classList.remove('selected'));
                    b.classList.add('selected');
                };
                area.appendChild(b);
            });
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        async function submit() {
            const name = document.getElementById('name').value;
            if(!name) return alert("이름을 써주세요!");
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({date: selDate, slot: selSlot, name, memo: document.getElementById('memo').value})
            });
            alert("완료!");
            location.reload();
        }
        loadData();
    </script>
</body>
</html>
