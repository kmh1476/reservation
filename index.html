<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상담 예약 시스템</title>
    <style>
        body { font-family: sans-serif; background: #f0fdfa; padding: 20px; margin: 0; }
        .header-wrap { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; color: #0d9488; }
        .nav-btn { font-size: 18px; border: none; background: white; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; color: #0d9488; font-weight: bold; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; max-width: 600px; margin: 0 auto; background: white; padding: 15px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .day-header { text-align: center; font-size: 14px; font-weight: bold; color: #64748b; margin-bottom: 10px; }
        .day-cell { height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 10px; border-radius: 12px; font-size: 16px; background: #f8fafc; border: 1px solid transparent; cursor: not-allowed; opacity: 0.5; }
        .day-cell.available { opacity: 1; cursor: pointer; background: #ccfbf1; color: #0f766e; font-weight: bold; border: 1px solid #14b8a6; transition: 0.2s; }
        .day-cell.available:hover { background: #99f6e4; transform: scale(1.05); }
        .badge { font-size: 10px; background: #0d9488; color: white; padding: 2px 6px; border-radius: 10px; margin-top: 5px; }

        /* 팝업 모달창 스타일 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-close { float: right; cursor: pointer; font-size: 20px; color: #94a3b8; border: none; background: none; }
        
        .slot-btn { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #cbd5e1; border-radius: 10px; background: white; cursor: pointer; font-size: 16px; }
        .slot-btn.selected { background: #0d9488; color: white; border-color: #0d9488; font-weight: bold; }
        
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 15px; background: #0d9488; color: white; border: none; border-radius: 10px; margin-top: 15px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="header-wrap">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <h2 id="monthTitle"></h2>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>

    <div class="calendar-grid" id="calendar">
        <div class="day-header">일</div><div class="day-header">월</div><div class="day-header">화</div><div class="day-header">수</div><div class="day-header">목</div><div class="day-header">금</div><div class="day-header">토</div>
    </div>

    <div class="modal-overlay" id="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal(event, true)">✖</button>
            <h3 style="margin-top: 0; color: #0d9488;" id="modalDateTitle">날짜</h3>
            
            <p style="margin-bottom: 5px; font-weight: bold; font-size: 14px;">1. 시간대 선택</p>
            <div id="slotButtons"></div>

            <div id="infoForm" style="display: none;">
                <input type="text" id="name" placeholder="학번 및 이름 (예: 30101 홍길동)" required>
                <textarea id="memo" rows="3" placeholder="간단한 상담 내용"></textarea>
                <button class="submit-btn" onclick="submitBooking()">예약 신청하기</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxQkqTTPcl6iEmIALNmQb4B03Vpa12GJ_JvmHxm6RKt9QQcPSemCGbhmPYVRfZtbNCjdQ/exec";
        let activeSlots = [];
        let currentDate = new Date();
        let selectedDate = "";
        let selectedSlot = "";

        async function init() {
            const res = await fetch(SCRIPT_URL);
            activeSlots = await res.json();
            render();
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            render();
        }

        function render() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('monthTitle').innerText = `${year}년 ${month + 1}월`;

            const container = document.getElementById('calendar');
            Array.from(container.children).forEach((child, i) => { if(i > 6) child.remove(); });

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            for(let i=0; i<firstDay; i++) container.appendChild(document.createElement('div'));

            for(let d=1; d<=lastDate; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                cell.innerText = d;

                const daySlots = activeSlots.filter(s => s.date === dateStr);
                if (daySlots.length > 0) {
                    cell.classList.add('available');
                    const badge = document.createElement('span');
                    badge.className = 'badge';
                    badge.innerText = "예약가능";
                    cell.appendChild(badge);
                    
                    cell.onclick = () => openModal(dateStr, daySlots);
                }
                container.appendChild(cell);
            }
        }

        function openModal(dateStr, slots) {
            selectedDate = dateStr;
            selectedSlot = "";
            document.getElementById('modalDateTitle').innerText = `🗓️ ${dateStr}`;
            document.getElementById('infoForm').style.display = 'none';
            document.getElementById('name').value = '';
            document.getElementById('memo').value = '';
            
            const btnArea = document.getElementById('slotButtons');
            btnArea.innerHTML = "";
            
            slots.forEach(s => {
                const btn = document.createElement('button');
                btn.className = 'slot-btn';
                btn.innerText = s.slot;
                btn.onclick = () => {
                    document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedSlot = s.slot;
                    document.getElementById('infoForm').style.display = 'block';
                };
                btnArea.appendChild(btn);
            });
            
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal(e, force = false) {
            if (force || e.target === document.getElementById('modal')) {
                document.getElementById('modal').style.display = 'none';
            }
        }

        async function submitBooking() {
            if (!document.getElementById('name').value) return alert("이름을 입력하세요!");
            
            const btn = document.querySelector('.submit-btn');
            btn.innerText = "처리 중...";
            btn.disabled = true;

            const data = {
                date: selectedDate,
                slot: selectedSlot,
                name: document.getElementById('name').value,
                memo: document.getElementById('memo').value
            };
            
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
            alert("예약이 확정되었습니다!");
            location.reload();
        }
        init();
    </script>
</body>
</html>
