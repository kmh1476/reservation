<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>흠쌤의 교무실</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e; --paper: #f5f0e8; --accent: #c0392b; --accent2: #2980b9;
  --muted: #8c7b6e; --border: #d4c9ba; --card: #fffdf8;
  --lunch: #e8f4fd; --after: #fdf3e8; --custom: #f0ede8;
  --lunch-accent: #2980b9; --after-accent: #e67e22; --custom-accent: #6c4f8e;
  --open: #27ae60; --closed: #e0d8cc;
  --sidebar-w: 220px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; overflow-x: hidden !important; } 
body { background: var(--paper); color: var(--ink); font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; overflow-y: auto; }

/* ── 상단 헤더 ── */
.topbar {
  background: var(--ink); color: #fff;
  min-height: 54px; display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; flex-shrink: 0; z-index: 10; flex-wrap: wrap; gap: 8px;
  width: 100%;
}
.topbar-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; flex: 1; min-width: 200px; }
.topbar-title { font-family: 'Nanum Myeongjo', serif; font-size: 1.05rem; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
.topbar-title span { opacity: .5; font-size: .8rem; font-weight: 400; }

.topbar-right { display: flex; align-items: center; gap: 12px; font-size: .78rem; color: #aaa; margin-left: auto; }
.topbar-clock { font-family: 'Nanum Myeongjo', serif; font-size: 0.95rem; color: #fff; white-space: nowrap; }

/* 현재 교시 표시 위젯 */
.period-indicator {
  background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2);
  padding: 4px 10px; border-radius: 4px; color: #fff; font-size: 0.78rem; font-weight: 500;
  display: flex; align-items: center; gap: 6px; white-space: nowrap;
}
.period-indicator .p-highlight { color: #f1c40f; font-weight: 700; }
.period-indicator .p-timer { color: #2ecc71; font-size: 0.72rem; }

/* ── 탭 네비 ── */
.tab-nav {
  background: var(--ink); display: flex; align-items: flex-end;
  padding: 0 16px; gap: 2px; flex-shrink: 0; border-bottom: 2px solid #333; width: 100%;
}
.tab-btn {
  padding: 10px 16px 8px; font-size: .82rem; font-weight: 600; cursor: pointer;
  background: #2c2c44; color: #999; border: none; border-radius: 6px 6px 0 0;
  transition: .15s; border-bottom: 2px solid transparent; margin-bottom: -2px;
}
.tab-btn.active { background: var(--paper); color: var(--ink); border-color: var(--paper); }
.tab-btn:hover:not(.active) { background: #383860; color: #ccc; }

/* ── 탭 컨텐츠 ── */
.tab-content { display: none; flex: 1; width: 100%; }
.tab-content.active { display: flex; flex-direction: column; }

/* ── 대시보드 메인 영역 ── */
.dash-container { width: 100%; overflow-x: hidden; }
.dash-wrap { 
  padding: 16px; 
  display: grid; 
  grid-template-columns: 1fr 280px; 
  gap: 16px; 
  width: 100%; 
  max-width: 1200px; 
  margin: 0 auto; 
}
.panel { background: var(--card); border: 1.5px solid var(--border); border-radius: 8px; padding: 16px; height: fit-content; width: 100%; min-width: 0; }
.panel-title { font-family: 'Nanum Myeongjo', serif; font-size: 0.95rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; color: var(--ink); font-weight: 700; }

/* 알림 배너 */
.alert-banner {
  grid-column: 1 / -1; background: #fff8f0; border: 1.5px solid #f0c080; border-radius: 8px;
  padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; width: 100%; min-width: 0;
}
.alert-banner.none { background: #f0faf4; border-color: #a8dbb8; }
.alert-ico { font-size: 1.4rem; flex-shrink: 0; }
.alert-text { flex: 1; min-width: 0; }
.alert-title { font-weight: 600; font-size: .9rem; color: #a85c00; margin-bottom: 3px; }
.alert-title.none { color: #1a6b3a; }
.alert-list { font-size: .8rem; color: #c07030; word-break: break-all; }
.alert-list.none { color: #2e8b57; }
.alert-open-btn { padding: 6px 12px; background: var(--ink); color: #fff; border: none; cursor: pointer; font-size: .78rem; font-weight: 600; border-radius: 4px; flex-shrink: 0; margin-left: auto; }

/* 시간표 래퍼 */
.tt-responsive-wrapper { width: 100%; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.tt-table { width: 100%; border-collapse: collapse; font-size: .78rem; table-layout: fixed; }
.tt-table th { background: var(--ink); color: #ccc; padding: 6px 2px; text-align: center; font-weight: 500; font-size: .7rem; overflow: hidden; white-space: nowrap; }
.tt-table th:first-child { width: 48px; }
.tt-table th.today-col { color: #7ab8f5; }
.tt-table td { padding: 8px 2px; text-align: center; border-bottom: 1px solid var(--border); color: var(--ink); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.tt-table td.today-col { background: #e8f0fe; color: #1a5cb5; font-weight: 600; }
.tt-table td.current-period-row { background: #ffeaa7 !important; color: #d35400 !important; font-weight: 700; }
.tt-table td.period { color: var(--muted); font-size: .68rem; background: var(--paper); width: 48px; font-weight: 600; }
.tt-table td.empty { color: #ccc; }
.tt-edit-btn { margin-top: 10px; width: 100%; padding: 8px; background: none; border: 1.5px dashed var(--border); color: var(--muted); cursor: pointer; font-size: .78rem; border-radius: 4px; }

/* 급식 */
.meal-tab-row { display: flex; gap: 6px; margin-bottom: 12px; }
.meal-tab { flex: 1; padding: 6px; border: 1.5px solid var(--border); background: none; cursor: pointer; font-size: .75rem; font-weight: 600; color: var(--muted); border-radius: 3px; text-align: center; }
.meal-tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.meal-list { list-style: none; }
.meal-list li { font-size: .82rem; padding: 6px 0; border-bottom: 1px solid var(--border); color: var(--ink); display: flex; align-items: center; gap: 6px; }
.meal-list li:last-child { border-bottom: none; }
.meal-list li::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--after-accent); flex-shrink: 0; }
.meal-loading { color: var(--muted); font-size: .82rem; text-align: center; padding: 20px 0; }
.meal-school { font-size: .75rem; color: var(--muted); }

/* 메모 */
.memo-input-row { display: flex; gap: 6px; margin-bottom: 10px; }
.memo-input { flex: 1; padding: 8px 10px; border: 1.5px solid var(--border); background: var(--paper); font-size: .85rem; font-family: inherit; outline: none; border-radius: 4px; min-width: 0; }
.memo-add-btn { padding: 8px 14px; background: var(--ink); color: #fff; border: none; cursor: pointer; font-size: .8rem; font-weight: 600; border-radius: 4px; white-space: nowrap; }
.memo-items { display: flex; flex-direction: column; gap: 6px; max-height: 220px; overflow-y: auto; }
.memo-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: var(--paper); border-radius: 4px; border: 1px solid var(--border); width: 100%; transition: box-shadow .15s; }
.memo-item.dragging { opacity: .5; box-shadow: 0 4px 12px rgba(0,0,0,.15); }
.memo-item.drag-over { border-color: var(--accent2); background: #e8f0fe; }
.memo-drag { color: #ccc; cursor: grab; font-size: 1rem; flex-shrink: 0; padding: 0 2px; user-select: none; }
.memo-drag:active { cursor: grabbing; }
.memo-cb { width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; accent-color: var(--open); }
.memo-text { flex: 1; font-size: .84rem; word-break: break-all; }
.memo-text.done { text-decoration: line-through; color: var(--muted); }
.memo-edit-input { flex: 1; font-size: .84rem; padding: 2px 6px; border: 1.5px solid var(--accent2); background: #fff; font-family: inherit; outline: none; border-radius: 3px; }
.memo-edit-btn { background: none; border: none; color: var(--accent2); cursor: pointer; font-size: .75rem; padding: 0 3px; flex-shrink: 0; }
.memo-del { background: none; border: none; color: #ccc; cursor: pointer; font-size: .9rem; padding: 0 2px; flex-shrink: 0; }
.memo-del:hover { color: var(--accent); }
.memo-empty { color: var(--muted); font-size: .82rem; text-align: center; padding: 16px 0; }

/* 디데이 배지 스타일 */
.dday-badge {
  font-size: 0.7rem; font-weight: 600; padding: 3px 6px; border-radius: 4px; color: #fff;
  display: inline-flex; align-items: center; gap: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.15); white-space: nowrap;
}
.dday-clr-0 { background-color: #c0392b; }
.dday-clr-1 { background-color: #2980b9; }
.dday-clr-2 { background-color: #27ae60; }
.dday-clr-3 { background-color: #8e44ad; }

/* 모달 구조 */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; padding: 12px; }
.modal-overlay.show { display: flex; }
.modal-box { background: var(--card); border: 2px solid var(--border); width: 100%; max-width: 600px; max-height: 85vh; overflow-y: auto; border-radius: 6px; }
.modal-header { background: var(--ink); color: #fff; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
.modal-header h2 { font-family: 'Nanum Myeongjo', serif; font-size: 0.95rem; }
.modal-close { background: none; border: none; color: #aaa; font-size: 1.3rem; cursor: pointer; padding: 2px 4px; }
.modal-body { padding: 16px; }

.tt-edit-wrapper { width: 100%; overflow-x: auto; margin-bottom: 10px; }
.tt-edit-table { width: 100%; border-collapse: collapse; min-width: 440px; }
.tt-edit-table th { background: var(--paper); padding: 8px 4px; font-size: .75rem; color: var(--muted); font-weight: 600; text-align: center; border-bottom: 1.5px solid var(--border); }
.tt-edit-table td { padding: 4px; border-bottom: 1px solid var(--border); }
.tt-edit-table input { width: 100%; padding: 6px 4px; border: 1.5px solid var(--border); font-size: .8rem; font-family: inherit; background: var(--paper); outline: none; text-align: center; border-radius: 3px; }
.tt-save-btn { width: 100%; padding: 11px; background: var(--accent2); color: #fff; border: none; cursor: pointer; font-weight: 700; font-size: .9rem; border-radius: 4px; }

.counsel-frame { width: 100%; flex: 1; border: none; }

/* 📱📱 미디어쿼리가 안 먹혀도 강제로 적용되도록 강력 처방한 모바일 구간 (500px 이하) 📱📱 */
@media screen and (max-width: 500px) {
  .dash-wrap { 
    grid-template-columns: 1fr !important; 
    padding: 8px !important; 
    gap: 8px !important;
    max-width: 100% !important;
    width: 100% !important;
  }
  .panel { padding: 8px !important; width: 100% !important; }
  .panel-title { font-size: 0.8rem !important; margin-bottom: 6px !important; }

  /* [핵심] 시간표 글자 크기, 여백을 한계까지 줄이고 강제 자동 줄바꿈 처리 */
  .tt-table { min-width: unset !important; width: 100% !important; table-layout: fixed !important; font-size: 0.6rem !important; }
  .tt-table th { padding: 3px 0 !important; font-size: 0.58rem !important; }
  .tt-table th:first-child { width: 32px !important; }
  .tt-table td { 
    padding: 5px 0 !important; 
    font-size: 0.6rem !important; 
    overflow: hidden !important;
    text-overflow: clip !important;
    white-space: normal !important; /* 한 줄로 뻗지 않고 칸 안에서 줄바꿈되도록 변경 */
    word-break: break-all !important; 
    line-height: 1.1 !important; 
  }
  .tt-table td.period { width: 32px !important; font-size: 0.55rem !important; }
  .tt-edit-btn { margin-top: 5px !important; padding: 5px !important; font-size: 0.68rem !important; }

  /* 알림 배너 뚱뚱해짐 방지 */
  .alert-banner { padding: 8px 10px !important; gap: 6px !important; }
  .alert-ico { font-size: 1.1rem !important; }
  .alert-title { font-size: 0.8rem !important; }
  .alert-list { font-size: 0.72rem !important; }
  .alert-open-btn { padding: 4px 8px !important; font-size: 0.7rem !important; }

  /* 급식 미니어처 */
  .meal-school { font-size: 0.68rem !important; }
  .meal-tab-row { margin-bottom: 6px !important; gap: 3px !important; }
  .meal-tab { padding: 3px !important; font-size: 0.68rem !important; }
  .meal-list li { font-size: 0.72rem !important; padding: 3px 0 !important; }
  
  /* 업무 메모 미니어처 */
  .memo-input-row { margin-bottom: 6px !important; gap: 3px !important; }
  .memo-input { padding: 5px 6px !important; font-size: 0.72rem !important; }
  .memo-add-btn { padding: 5px 8px !important; font-size: 0.7rem !important; }
  .memo-item { padding: 5px 6px !important; gap: 5px !important; }
  .memo-cb { width: 13px; height: 13px; }
  .memo-text { font-size: 0.72rem !important; }
  .memo-del { font-size: 0.8rem !important; }
  
  /* 헤더 컴팩트 */
  .topbar { padding: 6px 8px !important; gap: 2px !important; }
  .topbar-title { font-size: 0.85rem !important; }
  .topbar-title span { font-size: 0.65rem !important; }
  .topbar-clock { font-size: 0.8rem !important; }
  .period-indicator { padding: 1px 4px !important; font-size: 0.65rem !important; }
  .topbar-right { padding-top: 4px !important; width: 100% !important; justify-content: space-between !important; }
}

/* 학사일정 미니 달력 */
.mini-cal { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 12px; }
.mini-cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.mini-cal-title { font-size: .82rem; font-weight: 700; color: var(--ink); }
.mini-cal-nav-btn { background: none; border: 1px solid var(--border); color: var(--muted); width: 22px; height: 22px; cursor: pointer; font-size: .75rem; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
.mini-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.mini-cal-head { font-size: .62rem; text-align: center; color: var(--muted); padding: 2px 0; font-weight: 600; }
.mini-cal-cell { min-height: 28px; border-radius: 3px; padding: 2px; cursor: default; position: relative; display: flex; flex-direction: column; align-items: center; }
.mini-cal-cell.has-event { cursor: pointer; }
.mini-cal-cell.has-event:hover { background: #e8f0fe; }
.mini-cal-cell.selected { background: #e8f0fe; outline: 2px solid var(--accent2); outline-offset: -2px; }
.mini-cal-cell { cursor: pointer; }
.mini-cal-cell.today .mini-day { background: var(--ink); color: #fff; border-radius: 50%; }
.mini-cal-cell.empty { }
.mini-day { font-size: .7rem; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-weight: 500; color: var(--ink); flex-shrink: 0; }
.mini-cal-cell.sun .mini-day { color: #e74c3c; }
.mini-cal-cell.sat .mini-day { color: #2980b9; }
.mini-event-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); margin-top: 1px; }
.mini-event-dot.holiday { background: #e74c3c; }
.mini-event-dot.school { background: #27ae60; }
.mini-schedule-list { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; max-height: 100px; overflow-y: auto; }
.mini-schedule-item { font-size: .75rem; padding: 3px 0; border-bottom: 1px solid var(--border); display: flex; gap: 6px; align-items: flex-start; }
.mini-schedule-item:last-child { border-bottom: none; }
.mini-schedule-date { color: var(--muted); flex-shrink: 0; font-size: .7rem; }
.mini-schedule-name { color: var(--ink); flex: 1; }
.mini-schedule-name.holiday { color: #e74c3c; font-weight: 600; }
.mini-schedule-empty { color: var(--muted); font-size: .75rem; text-align: center; padding: 10px 0; }
.mini-cal-loading { color: var(--muted); font-size: .75rem; text-align: center; padding: 10px 0; }
.mini-cal-cell.has-memo { position: relative; }
.mini-cal-cell.has-memo::after { content: ''; position: absolute; bottom: 2px; right: 2px; width: 4px; height: 4px; border-radius: 50%; background: var(--after-accent); }
.mini-note-area { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
.mini-note-header { font-size: .72rem; font-weight: 700; color: var(--ink); margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
.mini-note-back { font-size: .7rem; color: var(--accent2); cursor: pointer; font-weight: 400; }
.mini-note-input-row { display: flex; gap: 4px; margin-bottom: 6px; }
.mini-note-input { flex: 1; padding: 5px 7px; border: 1.5px solid var(--border); background: var(--paper); font-size: .75rem; font-family: inherit; outline: none; border-radius: 3px; }
.mini-note-input:focus { border-color: var(--accent2); }
.mini-note-add-btn { padding: 5px 8px; background: var(--ink); color: #fff; border: none; cursor: pointer; font-size: .72rem; font-weight: 600; border-radius: 3px; white-space: nowrap; }
.mini-note-item { font-size: .75rem; padding: 4px 6px; background: var(--paper); border-radius: 3px; border: 1px solid var(--border); display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.mini-note-text { flex: 1; }
.mini-note-del { background: none; border: none; color: #ccc; cursor: pointer; font-size: .8rem; padding: 0; }
.mini-note-del:hover { color: var(--accent); }
.mini-note-empty { color: var(--muted); font-size: .75rem; padding: 4px 0; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">
      📋 흠쌤의 교무실
      <span id="topbar-date"></span>
    </div>
    <div id="dday-container" style="display: flex; gap: 4px; align-items: center; flex-wrap: wrap;"></div>
    <button onclick="openDDayModal()" style="background:none; border:none; color:#999; cursor:pointer; font-size:0.85rem; padding:2px;" title="디데이 관리">⚙️</button>
  </div>
  <div class="topbar-right">
    <div class="period-indicator" id="period-indicator">
      <span class="p-highlight" id="p-text">조회 중..</span>
      <span class="p-timer" id="p-timer"></span>
    </div>
    <span class="topbar-clock" id="topbar-clock"></span>
  </div>
</div>

<div class="tab-nav">
  <button class="tab-btn active" data-tab="dashboard">🏠 대시보드</button>
  <button class="tab-btn" data-tab="counsel">📋 상담 관리자</button>
</div>

<div class="tab-content active" id="tab-dashboard">
  <div class="dash-container">
    <div class="dash-wrap">

      <div class="alert-banner none" id="alert-banner">
        <div class="alert-ico" id="alert-ico">✅</div>
        <div class="alert-text">
          <div class="alert-title none" id="alert-title">오늘 예정된 상담이 없어요</div>
          <div class="alert-list none" id="alert-list">편안한 하루 되세요 😊</div>
        </div>
        <button class="alert-open-btn" onclick="switchTab('counsel')">상담 관리 열기</button>
      </div>

      <!-- 왼쪽 컬럼: 시간표 + 메모 -->
      <div style="display:flex;flex-direction:column;gap:16px;min-width:0">
        <div class="panel">
          <div class="panel-title">📅 주간 시간표</div>
          <div class="tt-responsive-wrapper">
            <table class="tt-table" id="tt-table">
              <thead>
                <tr>
                  <th>교시</th>
                  <th id="th-mon">월</th><th id="th-tue">화</th><th id="th-wed">수</th><th id="th-thu">목</th><th id="th-fri">금</th>
                </tr>
              </thead>
              <tbody id="tt-body"></tbody>
            </table>
          </div>
          <button class="tt-edit-btn" onclick="openTTEdit()">✏️ 시간표 편집</button>
        </div>

        <div class="panel">
          <div class="panel-title">📝 업무 메모</div>
          <div class="memo-input-row">
            <input class="memo-input" id="memo-input" placeholder="할 일을 입력하고 Enter" onkeydown="if(event.key==='Enter')addMemo()">
            <button class="memo-add-btn" onclick="addMemo()">추가</button>
          </div>
          <div class="memo-items" id="memo-items"></div>
        </div>
      </div>

      <!-- 오른쪽 컬럼: 급식 + 학사달력 -->
      <div class="panel">
        <div class="panel-title">🍱 오늘의 급식</div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div class="meal-school" id="meal-school">조회 중...</div>
        </div>
        <div class="meal-tab-row">

const SCHOOL_SCHEDULE = [
  { period: 1, start: "08:20", end: "09:10" },
  { period: 2, start: "09:20", end: "10:10" },
  { period: 3, start: "10:20", end: "11:10" },
  { period: 4, start: "11:20", end: "12:10" },
  { period: 5, start: "13:10", end: "14:00" },
  { period: 6, start: "14:10", end: "15:00" },
  { period: 7, start: "15:10", end: "16:00" }
];

function updateClock() {
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('topbar-date').textContent = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}요일`;
  document.getElementById('topbar-clock').textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  updatePeriodStatus(now);
}

function updatePeriodStatus(now) {
  const currentMinutes = now.getHours() * 60 + now.getMinutes();
  const seconds = now.getSeconds();
  const txtEl = document.getElementById('p-text');
  const timerEl = document.getElementById('p-timer');
  let currentPeriod = null; let statusText = ""; let remainingText = "";

  document.querySelectorAll('#tt-body tr').forEach(tr => tr.classList.remove('current-period-row'));

  if (currentMinutes >= 16 * 60 + 20) {
    txtEl.textContent = "방과후"; timerEl.textContent = ""; return;
  }
  if (currentMinutes < 8 * 60 + 40) {
    const diff = (8 * 60 + 40) - currentMinutes - 1;
    txtEl.textContent = "일과 전"; timerEl.textContent = `${diff}분 ${60 - seconds}초 전`; return;
  }

  for (let i = 0; i < SCHOOL_SCHEDULE.length; i++) {
    const sched = SCHOOL_SCHEDULE[i];
    const [sH, sM] = sched.start.split(':').map(Number);
    const [eH, eM] = sched.end.split(':').map(Number);
    const startTotal = sH * 60 + sM; const endTotal = eH * 60 + eM;

    if (currentMinutes >= startTotal && currentMinutes < endTotal) {
      currentPeriod = sched.period;
      const diff = endTotal - currentMinutes - 1;
      statusText = `${sched.period}교시`; remainingText = `${diff}분 ${60 - seconds}초 남음`; break;
    }
    if (i < SCHOOL_SCHEDULE.length - 1) {
      const nextSched = SCHOOL_SCHEDULE[i + 1];
      const [nsH, nsM] = nextSched.start.split(':').map(Number);
      if (currentMinutes >= endTotal && currentMinutes < (nsH * 60 + nsM)) {
        const diff = (nsH * 60 + nsM) - currentMinutes - 1;
        statusText = `쉬는 시간`; remainingText = `${nextSched.period}교시까지 ${diff}분 ${60 - seconds}초`; break;
      }
    } else {
      if (currentMinutes >= endTotal && currentMinutes < 16 * 60 + 20) { statusText = "일과 종료"; remainingText = ""; }
    }
  }
  txtEl.innerHTML = statusText; timerEl.textContent = remainingText;
  if (currentPeriod) {
    const targetRow = document.getElementById('tt-body').children[currentPeriod - 1];
    if (targetRow) targetRow.classList.add('current-period-row');
  }
}

setInterval(updateClock, 1000); updateClock();

window.switchTab = function(tab) {

function defaultTimetable() { const tt = {}; for (let p = 1; p <= PERIODS; p++) { tt[p] = {}; DAYS.forEach(d => tt[p][d] = ''); } return tt; }

onSnapshot(doc(db, 'timetable', 'weekly'), docSnap => {

});

async function saveTimetable() {
  const tt = {};
  for (let p = 1; p <= PERIODS; p++) { tt[p] = {}; DAYS.forEach(d => { tt[p][d] = document.getElementById(`tt-${p}-${d}`)?.value.trim() || ''; }); }

}
window.saveTimetable = saveTimetable;

function renderTimetable() {
  const dow = new Date().getDay(); const todayCol = dow >= 1 && dow <= 5 ? DAYS[dow - 1] : null;
  DAYS.forEach((d, i) => { const th = document.getElementById('th-' + d); if (th) { th.className = d === todayCol ? 'today-col' : ''; th.textContent = DAY_LABELS[i] + (d === todayCol ? ' ★' : ''); } });

    tr.innerHTML = `<td class="period">${p}교시</td>` + DAYS.map(d => { const val = timetable[p]?.[d] || ''; const cls = d === todayCol ? 'today-col' : (val === '' ? 'empty' : ''); return `<td class="${cls}">${val || '—'}</td>`; }).join('');
    tbody.appendChild(tr);

  const tbody = document.getElementById('tt-edit-body'); tbody.innerHTML = '';

    tbody.appendChild(tr);

  document.getElementById('tt-modal').classList.add('show');
}
function closeTTEdit() { document.getElementById('tt-modal').classList.remove('show'); }
window.openTTEdit = openTTEdit; window.closeTTEdit = closeTTEdit;

async function fetchNeisMeal() {
  const schoolLabel = document.getElementById('meal-school');
  if (NEIS_API_KEY === "발급받은_실제_인증키를_여기에_넣으세요") {
    schoolLabel.textContent = "인증키 미설정 상태";
    document.getElementById('meal-lunch-content').innerHTML = '<p class="meal-loading">코드 내부의 NEIS_API_KEY를 수정해주세요.</p>';
    return;
  }
  const now = new Date();
  const yyyymmdd = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  const url = `https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=${NEIS_API_KEY}&Type=json&pIndex=1&pSize=100&ATPT_OFCDC_SC_CODE=${OFFICE_CODE}&SD_SCHUL_CODE=${SCHOOL_CODE}&MLSV_YMD=${yyyymmdd}`;
  try {
    const res = await fetch(url); const data = await res.json(); mealData = { lunch: [], dinner: [] };
    if (data.mealServiceDietInfo) {
      const items = data.mealServiceDietInfo[1].row; schoolLabel.textContent = items[0].SCHUL_NM;
      items.forEach(row => {
        const menuClean = row.DDISH_NM.split('<br/>').map(menu => menu.replace(/[0-9.()]/g, '').trim()).filter(Boolean);
        if (row.MMEAL_SC_CODE === "2") { mealData.lunch = menuClean; } else if (row.MMEAL_SC_CODE === "3") { mealData.dinner = menuClean; }
      });
    } else { schoolLabel.textContent = "급식 없음 (주말/공휴일)"; }
  } catch (error) { console.error("나이스 API 로드 중 실패:", error); schoolLabel.textContent = "데이터 에러"; }
  renderMeal('lunch'); renderMeal('dinner');
}
function renderMeal(type) {
  const el = document.getElementById(`meal-${type}-content`); const items = mealData[type];
  if (!items || !items.length) { el.innerHTML = `<p class="meal-loading">오늘 ${type==='lunch'?'중식':'석식'} 정보가 없습니다.</p>`; return; }
  el.innerHTML = `<ul class="meal-list">${items.map(i => `<li>${i}</li>`).join('')}</ul>`;
}
window.showMeal = function(type, btn) {
  document.querySelectorAll('.meal-tab').forEach(t => t.classList.remove('active')); btn.classList.add('active');

  document.getElementById('meal-dinner-content').style.display = type === 'dinner' ? '' : 'none';
};
fetchNeisMeal();

window.renderMemos = function() {
  const container = document.getElementById('memo-items');
  container.innerHTML = '';
  if (!memos || !memos.length) {
    container.innerHTML = '<div class="memo-empty">할 일을 추가해보세요</div>';
    return;
  }
  memos.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'memo-item';
    div.draggable = true;
    div.dataset.idx = i;
    div.innerHTML = `
      <span class="memo-drag" title="드래그해서 순서 변경">⠿</span>
      <input type="checkbox" class="memo-cb" ${m.done ? 'checked' : ''} onchange="toggleMemo(${i})">
      <span class="memo-text ${m.done ? 'done' : ''}" id="memo-text-${i}">${m.text}</span>
      <button class="memo-edit-btn" onclick="startEditMemo(${i})" title="수정">✏️</button>
      <button class="memo-del" onclick="deleteMemo(${i})">✕</button>
    `;
    // 드래그 이벤트
    div.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', i);
      setTimeout(() => div.classList.add('dragging'), 0);
    });
    div.addEventListener('dragend', () => div.classList.remove('dragging'));
    div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-over'); });
    div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
    div.addEventListener('drop', async e => {
      e.preventDefault();
      div.classList.remove('drag-over');
      const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
      const toIdx = parseInt(div.dataset.idx);
      if (fromIdx === toIdx) return;
      const updated = [...memos];
      const [moved] = updated.splice(fromIdx, 1);
      updated.splice(toIdx, 0, moved);
      await syncMemosToFirebase(updated);
    });
    container.appendChild(div);
  });
};

window.startEditMemo = function(i) {
  const textEl = document.getElementById('memo-text-' + i);
  if (!textEl) return;
  const currentText = memos[i].text;
  const item = textEl.closest('.memo-item');
  // 텍스트 → 인풋으로 교체
  textEl.style.display = 'none';
  const input = document.createElement('input');
  input.className = 'memo-edit-input';
  input.value = currentText;
  item.insertBefore(input, textEl.nextSibling);
  input.focus();
  input.select();

  const save = async () => {
    const newText = input.value.trim();
    if (newText && newText !== currentText) {
      const updated = [...memos];
      updated[i].text = newText;
      await syncMemosToFirebase(updated);
    } else {
      renderMemos();
    }
  };
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') save();
    if (e.key === 'Escape') renderMemos();
  });
  input.addEventListener('blur', save);
};
async function syncMemosToFirebase(newMemos) {
  try { await setDoc(doc(db, 'memos', 'list'), { list: newMemos }); } catch (error) { console.error("메모 파이어베이스 동기화 실패:", error); }
}
window.addMemo = async function() {
  const input = document.getElementById('memo-input'); const text = input.value.trim(); if (!text) return;
  const updated = [...memos, { text, done: false }]; input.value = ''; await syncMemosToFirebase(updated);
};
window.toggleMemo = async function(i) { 
  const updated = [...memos]; updated[i].done = !updated[i].done; await syncMemosToFirebase(updated);
};
window.deleteMemo = async function(i) { 
  const updated = [...memos]; updated.splice(i, 1); await syncMemosToFirebase(updated);
};

onSnapshot(doc(db, 'memos', 'list'), docSnap => {
  if (docSnap.exists()) { memos = docSnap.data().list || []; } else { memos = []; }
  renderMemos();
});

function todayStr() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function updateAlertBanner() {
  const today = todayStr(); const books = bookingsCache[today] || []; const slotData = slotsCache[today] || {}; const customs = slotData.custom || []; const FIXED_LABEL = { lunch: '점심', after: '방과후' };
  const banner = document.getElementById('alert-banner'); const ico = document.getElementById('alert-ico'); const title = document.getElementById('alert-title'); const list = document.getElementById('alert-list');
  if (!books.length) { banner.className = 'alert-banner none'; ico.textContent = '✅'; title.className = 'alert-title none'; title.textContent = '오늘 예정된 상담이 없어요'; list.className = 'alert-list none'; list.textContent = '편안한 하루 되세요 😊'; return; }
  banner.className = 'alert-banner'; ico.textContent = '🔔'; title.className = 'alert-title'; title.textContent = `오늘 상담 ${books.length}건이 있어요`;
  const sorted = [...books].sort((a,b) => { const o = { lunch: 0, after: 1, custom: 2 }; return (o[a.type]??2) - (o[b.type]??2); });
  list.className = 'alert-list'; list.textContent = sorted.map(b => { let label = FIXED_LABEL[b.type] || ''; let time = b.type === 'lunch' ? '12:40' : b.type === 'after' ? '15:10' : ''; if (b.type === 'custom') { const cs = customs[b.customIdx]; if (cs) { label = cs.name; time = cs.start; } } return `${label} (${time}) — ${b.name}`; }).join('  ·  ');
}
let _slotsReady = false, _bookingsReady = false;
function maybeUpdate() { if (_slotsReady && _bookingsReady) updateAlertBanner(); }
onSnapshot(collection(db, 'slots'), snap => { slotsCache = {}; snap.forEach(d => slotsCache[d.id] = d.data()); _slotsReady = true; maybeUpdate(); });
onSnapshot(collection(db, 'bookings'), snap => { bookingsCache = {}; snap.forEach(d => { const b = d.data(); b.id = d.id; if (!bookingsCache[b.date]) bookingsCache[b.date] = []; bookingsCache[b.date].push(b); }); _bookingsReady = true; maybeUpdate(); });

window.addDDay = async function() {
  const titleInput = document.getElementById('dday-title-input'); const dateInput = document.getElementById('dday-date-input');
  const title = titleInput.value.trim(); const targetDate = dateInput.value;
  if (!title || !targetDate) { alert('일정 이름 and 날짜를 모두 입력해주세요!'); return; }
  try {
    await addDoc(collection(db, 'ddays'), { title: title, targetDate: targetDate });
    titleInput.value = ''; dateInput.value = '';
  } catch (error) { console.error("디데이 추가 실패:", error); alert("저장에 실패했습니다."); }
};
window.deleteDDay = async function(id) {
  if (!confirm('이 디데이 일정을 삭제하시겠습니까?')) return;
  try { await deleteDoc(doc(db, 'ddays', id)); } catch (error) { console.error("디데이 삭제 실패:", error); alert("삭제에 실패했습니다."); }
};
onSnapshot(collection(db, 'ddays'), snap => {
  const container = document.getElementById('dday-container'); const manageList = document.getElementById('dday-manage-list');
  if (!container) return;
  container.innerHTML = ''; if (manageList) manageList.innerHTML = '';
  
  const now = new Date(); const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const ddayItems = [];
  
  snap.forEach(snapshotDoc => {
    const data = snapshotDoc.data(); if (!data.title || !data.targetDate) return;
    let target = new Date(data.targetDate);
    ddayItems.push({ id: snapshotDoc.id, title: data.title, targetDateString: data.targetDate, targetDateObj: target });
  });

  ddayItems.sort((a, b) => a.targetDateObj - b.targetDateObj);

  ddayItems.forEach((itemData, index) => {
    const targetDay = new Date(itemData.targetDateObj.getFullYear(), itemData.targetDateObj.getMonth(), itemData.targetDateObj.getDate());
    const diffTime = targetDay.getTime() - today.getTime(); const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    
    let ddayText = '';
    if (diffDays === 0) ddayText = 'D-DAY';
    else if (diffDays > 0) ddayText = `D-${diffDays}`;
    else ddayText = `D+${Math.abs(diffDays)}`;

    const colorClass = `dday-clr-${index % 4}`;
    const badge = document.createElement('span');
    badge.className = `dday-badge ${colorClass}`;
    badge.title = itemData.targetDateString;
    badge.innerHTML = `<span>${itemData.title}</span> <span style="opacity: 0.85; font-size: 0.65rem;">${ddayText}</span>`;
    container.appendChild(badge);

    if (manageList) {
      const item = document.createElement('div');
      item.style = "display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; background: var(--paper); border-radius: 4px; font-size: 0.85rem; border: 1px solid var(--border);";
      item.innerHTML = `
        <div>
          <strong style="color: var(--ink);">${itemData.title}</strong> 
          <span style="font-size: 0.75rem; color: var(--muted); margin-left: 6px;">(${itemData.targetDateString})</span>
        </div>
        <button onclick="deleteDDay('${itemData.id}')" style="background: none; border: none; color: var(--accent); cursor: pointer; font-size: 0.85rem; padding: 2px 6px;">삭제</button>
      `;
      manageList.appendChild(item);
    }
  });
  
  if (manageList && snap.empty) {
    manageList.innerHTML = '<div style="color: var(--muted); font-size: 0.82rem; text-align: center; padding: 16px 0;">등록된 디데이가 없습니다.</div>';
  }
});
// ── 학사일정 달력 ──
let miniCalYear, miniCalMonth;
let scheduleCache = {};
let calNotes = {};        // { 'YYYYMMDD': ['메모1','메모2'] } — Firebase 실시간 동기화
let currentViewDate = null;

// Firebase 실시간 동기화
onSnapshot(doc(db, 'cal_notes', 'data'), snap => {
  calNotes = snap.exists() ? (snap.data().notes || {}) : {};
  renderMiniCalDots();
  // 상세보기 중이면 메모 목록도 갱신
  if (currentViewDate) {
    const key = `${miniCalYear}-${String(miniCalMonth).padStart(2,'0')}`;
    const evts = (scheduleCache[key] || []).filter(e => e.date === currentViewDate);
    showScheduleForDate(currentViewDate, evts, true);
  }
});

async function saveCalNotes() {
  await setDoc(doc(db, 'cal_notes', 'data'), { notes: calNotes });
}

(function initMiniCal() {
  const now = new Date();
  miniCalYear = now.getFullYear();
  miniCalMonth = now.getMonth() + 1;
  fetchSchoolSchedule(miniCalYear, miniCalMonth);
})();

window.miniCalMove = function(dir) {
  miniCalMonth += dir;
  if (miniCalMonth > 12) { miniCalMonth = 1; miniCalYear++; }
  if (miniCalMonth < 1)  { miniCalMonth = 12; miniCalYear--; }
  currentViewDate = null;
  renderMiniCal();
  const key = `${miniCalYear}-${String(miniCalMonth).padStart(2,'0')}`;
  if (!scheduleCache[key]) fetchSchoolSchedule(miniCalYear, miniCalMonth);
};

async function fetchSchoolSchedule(year, month) {
  const key = `${year}-${String(month).padStart(2,'0')}`;
  const ym = `${year}${String(month).padStart(2,'0')}`;
  const url = `https://open.neis.go.kr/hub/SchoolSchedule?KEY=${NEIS_API_KEY}&Type=json&pIndex=1&pSize=100&ATPT_OFCDC_SC_CODE=${OFFICE_CODE}&SD_SCHUL_CODE=${SCHOOL_CODE}&AA_YMD=${ym}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    const rows = data?.SchoolSchedule?.[1]?.row || [];
    scheduleCache[key] = rows.map(r => ({
      date: r.AA_YMD,
      name: r.EVENT_NM,
      isHoliday: r.EVENT_NM.includes('방학') || r.EVENT_NM.includes('휴업') || r.EVENT_NM.includes('공휴일')
    }));
  } catch(e) {
    scheduleCache[key] = [];
  }
  renderMiniCal();
}

window.renderMiniCal = function renderMiniCal() {
  const key = `${miniCalYear}-${String(miniCalMonth).padStart(2,'0')}`;
  const events = scheduleCache[key] || null;
  document.getElementById('mini-cal-title').textContent = `${miniCalYear}년 ${miniCalMonth}월`;

  const grid = document.getElementById('mini-cal-grid');
  grid.innerHTML = '';

  const firstDay = new Date(miniCalYear, miniCalMonth - 1, 1).getDay();
  const lastDate = new Date(miniCalYear, miniCalMonth, 0).getDate();
  const now = new Date();
  const todayStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'mini-cal-cell empty';
    grid.appendChild(el);
  }

  for (let d = 1; d <= lastDate; d++) {
    const dateStr = `${miniCalYear}${String(miniCalMonth).padStart(2,'0')}${String(d).padStart(2,'0')}`;
    const dayOfWeek = new Date(miniCalYear, miniCalMonth - 1, d).getDay();
    const dayEvents = events ? events.filter(e => e.date === dateStr) : [];
    const hasNote = (calNotes[dateStr] || []).length > 0;
    const isToday = dateStr === todayStr;
    const isSelected = dateStr === currentViewDate;

    const cell = document.createElement('div');
    let cls = 'mini-cal-cell';
    if (isToday) cls += ' today';
    if (dayOfWeek === 0) cls += ' sun';
    if (dayOfWeek === 6) cls += ' sat';
    if (dayEvents.length) cls += ' has-event';
    if (hasNote) cls += ' has-memo';
    if (isSelected) cls += ' selected';
    cell.className = cls;

    let inner = `<div class="mini-day">${d}</div>`;
    dayEvents.slice(0, 1).forEach(ev => {
      inner += `<div class="mini-event-dot ${ev.isHoliday ? 'holiday' : 'school'}"></div>`;
    });
    cell.innerHTML = inner;
    cell.onclick = () => showScheduleForDate(dateStr, dayEvents);
    grid.appendChild(cell);
  }

  if (currentViewDate) {
    const evts = events ? events.filter(e => e.date === currentViewDate) : [];
    showScheduleForDate(currentViewDate, evts, true);
  } else {
    renderScheduleList(events, key);
  }
}

window.renderScheduleList = function renderScheduleList(events, key) {
  const list = document.getElementById('mini-schedule-list');
  if (!events) { list.innerHTML = '<div class="mini-cal-loading">불러오는 중...</div>'; return; }

  const now = new Date();
  const todayNum = parseInt(`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`);
  const upcoming = events.filter(e => parseInt(e.date) >= todayNum).slice(0, 8);

  let html = '';
  if (upcoming.length) {
    const frag = document.createDocumentFragment();
    upcoming.forEach(e => {
      const d = e.date;
      const dateLabel = `${parseInt(d.slice(4,6))}/${parseInt(d.slice(6,8))}`;
      const div = document.createElement('div');
      div.className = 'mini-schedule-item';
      div.style.cursor = 'pointer';
      div.innerHTML = `<span class="mini-schedule-date">${dateLabel}</span><span class="mini-schedule-name ${e.isHoliday ? 'holiday' : ''}">${e.name}</span>`;
      div.onclick = () => {
        const key2 = `${d.slice(0,4)}-${d.slice(4,6)}`;
        const evts = (scheduleCache[key2] || []).filter(x => x.date === d);
        showScheduleForDate(d, evts);
      };
      frag.appendChild(div);
    });
    list.innerHTML = '';
    list.appendChild(frag);
    return;
  } else {
    html = '<div class="mini-schedule-empty">이번 달 남은 학사일정이 없습니다.</div>';
  }
}

window.showScheduleForDate = function showScheduleForDate(dateStr, dayEvents, skipRerender) {
  currentViewDate = dateStr;
  if (!skipRerender) renderMiniCal();  // 달력 셀 선택 표시 갱신

  const d = dateStr;
  const dateLabel = `${parseInt(d.slice(0,4))}년 ${parseInt(d.slice(4,6))}월 ${parseInt(d.slice(6,8))}일`;
  const notes = calNotes[dateStr] || [];
  const curKey = `${miniCalYear}-${String(miniCalMonth).padStart(2,'0')}`;

  const list = document.getElementById('mini-schedule-list');
  list.innerHTML = `
    <div class="mini-note-header">
      <span>📅 ${dateLabel}</span>
      <span class="mini-note-back" id="mini-back-btn">← 목록으로</span>
    </div>
    ${dayEvents.length
      ? dayEvents.map(e => `<div class="mini-schedule-item"><span class="mini-schedule-name ${e.isHoliday ? 'holiday' : ''}">${e.name}</span></div>`).join('')
      : '<div style="font-size:.72rem;color:var(--muted);margin-bottom:6px">학사일정 없음</div>'
    }
    <div class="mini-note-area">
      <div style="font-size:.72rem;font-weight:600;color:var(--muted);margin-bottom:5px">📌 메모</div>
      <div class="mini-note-input-row">
        <input class="mini-note-input" id="mini-note-input-${dateStr}" placeholder="메모 입력 후 Enter">
        <button class="mini-note-add-btn">추가</button>
      </div>
      <div id="mini-notes-${dateStr}">
        ${notes.length
          ? notes.map((n,i) => `<div class="mini-note-item"><span class="mini-note-text">${n}</span><button class="mini-note-del" data-idx="${i}">✕</button></div>`).join('')
          : '<div class="mini-note-empty">메모가 없습니다.</div>'
        }
      </div>
    </div>
  `;
  // 목록으로 버튼 이벤트 — innerHTML onclick은 module scope에서 안 됨
  const backBtn = document.getElementById('mini-back-btn');
  if (backBtn) {
    backBtn.onclick = () => {
      currentViewDate = null;
      renderMiniCal();
    };
  }
  // addCalNote, delCalNote 버튼도 이벤트 재바인딩
  const addBtn = list.querySelector('.mini-note-add-btn');
  if (addBtn) addBtn.onclick = () => addCalNote(dateStr);
  const noteInput = list.querySelector('.mini-note-input');
  if (noteInput) noteInput.addEventListener('keydown', e => { if (e.key === 'Enter') addCalNote(dateStr); });
  list.querySelectorAll('.mini-note-del').forEach((btn, i) => {
    btn.onclick = () => delCalNote(dateStr, i);
  });
}

window.addCalNote = async function(dateStr) {
  const input = document.getElementById('mini-note-input-' + dateStr);
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  if (!calNotes[dateStr]) calNotes[dateStr] = [];
  calNotes[dateStr].push(text);
  input.value = '';
  await saveCalNotes(); // Firebase 저장 (onSnapshot이 자동으로 UI 갱신)
};

window.delCalNote = async function(dateStr, idx) {
  if (!calNotes[dateStr]) return;
  calNotes[dateStr].splice(idx, 1);
  if (!calNotes[dateStr].length) delete calNotes[dateStr];
  await saveCalNotes(); // Firebase 저장
};

function renderMiniCalDots() {
  // 메모 dot만 갱신 (달력 전체 재렌더 없이)
  document.querySelectorAll('.mini-cal-cell').forEach(cell => {
    const d = cell.querySelector('.mini-day');
    if (!d) return;
    const dayNum = parseInt(d.textContent);
    if (isNaN(dayNum)) return;
    const dateStr = `${miniCalYear}${String(miniCalMonth).padStart(2,'0')}${String(dayNum).padStart(2,'0')}`;
    const hasNote = (calNotes[dateStr] || []).length > 0;
    cell.classList.toggle('has-memo', hasNote);
  });
}


</script>
