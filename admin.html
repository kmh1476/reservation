<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>상담 관리자 모드</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f1f5f9; padding: 20px; }
        .calendar-header { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); max-width: 900px; margin: 0 auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .day-header { background: #f8fafc; padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #e2e8f0; color: #64748b; }
        .day-cell { height: 120px; border: 0.5px solid #e2e8f0; padding: 10px; position: relative; }
        .day-num { font-weight: bold; margin-bottom: 10px; display: block; }
        .slot-toggle { display: block; width: 100%; padding: 4px; margin-top: 4px; font-size: 11px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; background: white; transition: 0.2s; }
        .slot-toggle.active-lunch { background: #0d9488; color: white; border-color: #0d9488; }
        .slot-toggle.active-after { background: #3b82f6; color: white; border-color: #3b82f6; }
        .sun { color: #ef4444; } .sat { color: #3b82f6; }
    </style>
</head>
<body>
    <div class="calendar-header">
        <h2 id="monthTitle">2026년 5월</h2>
    </div>
    <div class="calendar-grid" id="calendar">
        <div class="day-header sun">일</div><div class="day-header">월</div><div class="day-header">화</div><div class="day-header">수</div><div class="day-header">목</div><div class="day-header">금</div><div class="day-header sat">토</div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzlz6J20XF5gjALVAIm70IvIJO5z1uYSjJgd3_Q6wr1CMFnzRpcc1nhWQm-eY5IEpnWhA/exec";
        let activeSlots = [];

        async function loadSettings() {
            const res = await fetch(SCRIPT_URL);
            activeSlots = await res.json();
            render();
        }

        async function toggle(date, slot) {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({action: 'toggle', date, slot}) });
            loadSettings(); // 새로고침 없이 상태 반영
        }

        function render() {
            const container = document.getElementById('calendar');
            // 기존 셀 제거 (헤더 제외)
            Array.from(container.children).forEach((child, i) => { if(i > 6) child.remove(); });

            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            // 공백 채우기
            for(let i=0; i<firstDay; i++) container.appendChild(document.createElement('div'));

            for(let d=1; d<=lastDate; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                
                const isLunchActive = activeSlots.some(s => s.date === dateStr && s.slot === "점심");
                const isAfterActive = activeSlots.some(s => s.date === dateStr && s.slot === "방과후");

                cell.innerHTML = `
                    <span class="day-num">${d}</span>
                    <button class="slot-toggle ${isLunchActive?'active-lunch':''}" onclick="toggle('${dateStr}', '점심')">점심</button>
                    <button class="slot-toggle ${isAfterActive?'active-after':''}" onclick="toggle('${dateStr}', '방과후')">방과후</button>
                `;
                container.appendChild(cell);
            }
        }
        loadSettings();
    </script>
</body>
</html>
