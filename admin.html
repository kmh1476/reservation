<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담 관리자 페이지</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e; --paper: #f5f0e8; --accent: #c0392b; --accent2: #2980b9;
    --muted: #8c7b6e; --border: #d4c9ba; --card: #fffdf8;
    --lunch: #e8f4fd; --after: #fdf3e8; --custom: #f0ede8;
    --lunch-accent: #2980b9; --after-accent: #e67e22; --custom-accent: #6c4f8e;
    --open: #27ae60; --closed: #e0d8cc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'Pretendard', sans-serif; min-height: 100vh; }

  /* 로그인 */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--ink); }
  .login-box { background: var(--card); border: 2px solid var(--border); padding: 48px 40px; width: 360px; text-align: center; }
  .login-box h1 { font-family: 'Nanum Myeongjo', serif; font-size: 1.6rem; margin-bottom: 6px; }
  .login-box p { color: var(--muted); font-size: .85rem; margin-bottom: 32px; }
  .login-box input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); background: var(--paper); font-size: .95rem; margin-bottom: 12px; outline: none; }
  .login-box button { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; cursor: pointer; font-weight: 600; }
  .login-err { color: var(--accent); font-size: .82rem; margin-top: 8px; }

  #app { display: none; }
  header { background: var(--ink); color: #fff; padding: 0 40px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-family: 'Nanum Myeongjo', serif; font-size: 1.25rem; }
  .logout-btn { background: none; border: 1px solid #555; color: #ccc; padding: 6px 14px; cursor: pointer; font-size: .8rem; }

  .main-wrap { max-width: 1100px; margin: 0 auto; padding: 40px 24px; display: grid; grid-template-columns: 1fr 400px; gap: 32px; }

  /* 달력 */
  .cal-nav { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .cal-nav h2 { font-family: 'Nanum Myeongjo', serif; font-size: 1.5rem; flex: 1; }
  .nav-btn { background: none; border: 1.5px solid var(--border); width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .calendar { border: 1.5px solid var(--border); background: var(--card); overflow: hidden; }
  .cal-head { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--ink); color: #ccc; font-size: .78rem; text-align: center; }
  .cal-head span { padding: 10px 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); min-height: 90px; padding: 8px; cursor: pointer; position: relative; }
  .cal-cell.empty { background: #f0ebe3; cursor: default; }
  .cal-cell.selected { background: #e8f0fe; outline: 2px solid var(--accent2); outline-offset: -2px; }
  .cell-date { font-size: .78rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  .slot-badge { display: flex; align-items: center; gap: 4px; font-size: .68rem; font-weight: 600; padding: 2px 6px; border-radius: 2px; margin-bottom: 3px; width: fit-content; max-width: 100%; overflow: hidden; }
  .slot-badge span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .slot-badge.lunch-open { background: var(--lunch); color: var(--lunch-accent); }
  .slot-badge.after-open { background: var(--after); color: var(--after-accent); }
  .slot-badge.custom-open { background: var(--custom); color: var(--custom-accent); }

  /* 패널 */
  .panel-card { background: var(--card); border: 1.5px solid var(--border); padding: 24px; margin-bottom: 20px; }
  .panel-card h3 { font-family: 'Nanum Myeongjo', serif; font-size: 1.1rem; margin-bottom: 4px; }
  .panel-sub { font-size: .8rem; color: var(--muted); margin-bottom: 20px; }
  .slot-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .slot-row:last-child { border-bottom: none; }
  .slot-label { font-size: .9rem; font-weight: 600; }
  .slot-label.lunch { color: var(--lunch-accent); }
  .slot-label.after { color: var(--after-accent); }
  .slot-label.custom { color: var(--custom-accent); }
  .slot-time { font-size: .78rem; color: var(--muted); }

  /* 토글 */
  .toggle { position: relative; width: 48px; height: 26px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track { position: absolute; inset: 0; background: var(--closed); border-radius: 13px; cursor: pointer; transition: .25s; }
  .toggle-track::after { content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: .25s; }
  .toggle input:checked + .toggle-track { background: var(--open); }
  .toggle input:checked + .toggle-track::after { transform: translateX(22px); }

  /* 커스텀 슬롯 추가 폼 */
  .add-slot-section { margin-top: 16px; padding-top: 16px; border-top: 1.5px dashed var(--border); }
  .add-slot-label { font-size: .78rem; font-weight: 600; color: var(--custom-accent); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .add-slot-label::before { content: '+'; font-size: 1rem; }
  .add-slot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .add-slot-grid input { padding: 8px 10px; border: 1.5px solid var(--border); background: var(--paper); font-size: .82rem; outline: none; width: 100%; }
  .add-slot-grid input:focus { border-color: var(--custom-accent); }
  .add-slot-name { grid-column: 1 / -1; }
  .add-slot-btn { width: 100%; padding: 9px; background: var(--custom-accent); color: #fff; border: none; cursor: pointer; font-weight: 600; font-size: .82rem; }
  .add-slot-btn:hover { opacity: .85; }

  /* 커스텀 슬롯 아이템 (토글 포함) */
  .custom-slot-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .custom-slot-info { flex: 1; min-width: 0; margin-right: 12px; }
  .custom-slot-name { font-size: .88rem; font-weight: 600; color: var(--custom-accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .custom-slot-time { font-size: .75rem; color: var(--muted); }
  .custom-slot-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .del-slot-btn { background: none; border: 1px solid #ddd; color: #bbb; font-size: .7rem; padding: 2px 7px; cursor: pointer; }
  .del-slot-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* 예약 목록 */
  .booking-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .booking-item:last-child { border-bottom: none; }
  .b-type { display: inline-block; padding: 1px 6px; font-size: .65rem; font-weight: 700; border-radius: 1px; margin-right: 5px; }
  .b-type.lunch { background: var(--lunch); color: var(--lunch-accent); }
  .b-type.after { background: var(--after); color: var(--after-accent); }
  .b-type.custom { background: var(--custom); color: var(--custom-accent); }
  .b-name { font-weight: 600; font-size: .9rem; }
  .b-slot { font-size: .75rem; color: var(--custom-accent); margin-top: 2px; }
  .b-content { font-size: .8rem; color: var(--muted); margin-top: 4px; white-space: pre-wrap; }
  .b-delete { margin-top: 8px; background: none; border: 1px solid #ddd; color: #999; font-size: .72rem; padding: 2px 8px; cursor: pointer; }
  .b-delete:hover { border-color: var(--accent); color: var(--accent); }

  .pw-section input { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); background: var(--paper); font-size: .88rem; margin-bottom: 8px; outline: none; }
  .pw-section button { width: 100%; padding: 10px; background: var(--ink); color: #fff; border: none; cursor: pointer; font-weight: 600; }

  .no-date-msg { text-align: center; color: #999; padding: 20px 0; font-size: .85rem; }

  /* 오늘 상담 알림 모달 */
  .today-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .today-overlay.show { display: flex; }
  .today-modal { background: var(--card); border: 2px solid var(--border); width: 100%; max-width: 380px; overflow: hidden; }
  .today-modal-header { background: var(--ink); color: #fff; padding: 18px 22px; display: flex; align-items: center; gap: 10px; }
  .today-modal-header h2 { font-family: 'Nanum Myeongjo', serif; font-size: 1.1rem; }
  .today-modal-body { padding: 20px 22px; }
  .today-date-label { font-size: .78rem; color: var(--muted); margin-bottom: 14px; }
  .today-booking-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .today-booking-item:last-child { border-bottom: none; }
  .today-slot-tag { font-size: .65rem; font-weight: 700; padding: 2px 7px; border-radius: 2px; flex-shrink: 0; margin-top: 2px; }
  .today-slot-tag.lunch  { background: var(--lunch);  color: var(--lunch-accent); }
  .today-slot-tag.after  { background: var(--after);  color: var(--after-accent); }
  .today-slot-tag.custom { background: var(--custom); color: var(--custom-accent); }
  .today-booking-name { font-weight: 600; font-size: .9rem; }
  .today-booking-time { font-size: .75rem; color: var(--muted); }
  .today-modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
  .today-close-btn { flex: 1; padding: 10px; background: var(--ink); color: #fff; border: none; cursor: pointer; font-weight: 600; font-size: .88rem; }
  .today-goto-btn  { flex: 1; padding: 10px; background: none; border: 1.5px solid var(--accent2); color: var(--accent2); cursor: pointer; font-weight: 600; font-size: .88rem; }

  @media(max-width: 768px) { .main-wrap { grid-template-columns: 1fr; } header { padding: 0 16px; } }

  /* 상담 기록 버튼 */
  .b-record { margin-top: 8px; margin-left: 4px; background: none; border: 1px solid var(--accent2); color: var(--accent2); font-size: .72rem; padding: 2px 8px; cursor: pointer; }
  .b-record:hover { background: var(--accent2); color: #fff; }
  .b-has-record::before { content: "✓ "; }

  /* 기록 작성/수정 모달 */
  .rec-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
  .rec-overlay.show { display: flex; }
  .rec-modal { background: var(--card); border: 2px solid var(--border); width: 100%; max-width: 480px; }
  .rec-modal-header { background: var(--ink); color: #fff; padding: 16px 22px; display: flex; align-items: center; justify-content: space-between; }
  .rec-modal-header h2 { font-family: "Nanum Myeongjo", serif; font-size: 1rem; }
  .rec-modal-close { background: none; border: none; color: #aaa; font-size: 1.3rem; cursor: pointer; line-height: 1; }
  .rec-modal-body { padding: 22px; }
  .rec-info { font-size: .78rem; color: var(--muted); margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .rec-field { margin-bottom: 14px; }
  .rec-field label { display: block; font-size: .75rem; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
  .rec-field textarea { width: 100%; padding: 10px; border: 1.5px solid var(--border); font-family: inherit; font-size: .88rem; outline: none; resize: vertical; }
  .rec-field textarea:focus { border-color: var(--accent2); }
  .rec-private-area { background: #fff8f0; border: 1.5px solid #f0c080; padding: 12px; margin-bottom: 14px; }
  .rec-private-area label { font-size: .75rem; font-weight: 700; color: #c0762b; margin-bottom: 5px; display: block; }
  .rec-private-area textarea { border-color: #f0c080; background: #fff; width: 100%; padding: 10px; font-family: inherit; font-size: .88rem; outline: none; resize: vertical; }
  .rec-save-btn { width: 100%; padding: 12px; background: var(--accent2); color: #fff; border: none; cursor: pointer; font-weight: 700; font-size: .92rem; }

  /* 학생 기록 조회 모달 */
  .hist-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 300; align-items: flex-start; justify-content: center; padding: 40px 20px; overflow-y: auto; }
  .hist-overlay.show { display: flex; }
  .hist-modal { background: var(--card); border: 2px solid var(--border); width: 100%; max-width: 560px; }
  .hist-modal-header { background: var(--ink); color: #fff; padding: 16px 22px; display: flex; align-items: center; justify-content: space-between; }
  .hist-modal-header h2 { font-family: "Nanum Myeongjo", serif; font-size: 1rem; }
  .hist-search { display: flex; gap: 8px; padding: 16px 22px; border-bottom: 1px solid var(--border); }
  .hist-search input { flex: 1; padding: 9px 12px; border: 1.5px solid var(--border); background: var(--paper); font-size: .9rem; outline: none; }
  .hist-search input:focus { border-color: var(--accent2); }
  .hist-search button { padding: 9px 18px; background: var(--ink); color: #fff; border: none; cursor: pointer; font-weight: 600; }
  .hist-body { padding: 16px 22px; max-height: 62vh; overflow-y: auto; }
  .hist-item { border: 1.5px solid var(--border); margin-bottom: 14px; }
  .hist-item-header { background: var(--paper); padding: 9px 14px; display: flex; align-items: center; gap: 10px; }
  .hist-item-date { font-weight: 700; font-size: .88rem; }
  .hist-item-body { padding: 12px 14px; }
  .hist-section-label { font-size: .7rem; font-weight: 700; color: var(--muted); margin-bottom: 4px; letter-spacing: .04em; }
  .hist-section-text { font-size: .85rem; margin-bottom: 10px; white-space: pre-wrap; line-height: 1.6; color: var(--ink); }
  .hist-private-box { background: #fff8f0; border: 1px solid #f0c080; padding: 10px 12px; margin-top: 4px; }
  .hist-private-label { font-size: .7rem; font-weight: 700; color: #c0762b; margin-bottom: 4px; }
  .hist-private-text { font-size: .85rem; white-space: pre-wrap; line-height: 1.6; }
  .hist-empty { text-align: center; color: #999; padding: 40px 0; font-size: .88rem; }
  .hist-request-text { font-size: .8rem; color: var(--muted); font-style: italic; margin-bottom: 8px; white-space: pre-wrap; }

  /* 통계 모달 */
  .stat-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 300; align-items: flex-start; justify-content: center; padding: 30px 20px; overflow-y: auto; }
  .stat-overlay.show { display: flex; }
  .stat-modal { background: var(--card); border: 2px solid var(--border); width: 100%; max-width: 680px; }
  .stat-modal-header { background: var(--ink); color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .stat-modal-header h2 { font-family: 'Nanum Myeongjo', serif; font-size: 1.05rem; }
  .stat-tabs { display: flex; border-bottom: 2px solid var(--border); background: var(--paper); }
  .stat-tab { padding: 12px 22px; font-size: .85rem; font-weight: 600; cursor: pointer; border: none; background: none; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; }
  .stat-tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
  .stat-body { padding: 24px; }
  .stat-section { margin-bottom: 28px; }
  .stat-section h4 { font-family: 'Nanum Myeongjo', serif; font-size: 1rem; margin-bottom: 14px; color: var(--ink); }
  .stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .stat-bar-label { font-size: .82rem; min-width: 90px; color: var(--ink); }
  .stat-bar-wrap { flex: 1; background: #ede8e0; height: 18px; border-radius: 2px; overflow: hidden; }
  .stat-bar { height: 100%; border-radius: 2px; transition: width .4s; }
  .stat-bar.lunch { background: var(--lunch-accent); }
  .stat-bar.after { background: var(--after-accent); }
  .stat-bar.custom { background: var(--custom-accent); }
  .stat-bar.total { background: var(--accent2); }
  .stat-count { font-size: .82rem; font-weight: 700; color: var(--muted); min-width: 28px; text-align: right; }
  .stat-summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-summary-card { background: var(--paper); border: 1.5px solid var(--border); padding: 14px; text-align: center; }
  .stat-summary-num { font-family: 'Nanum Myeongjo', serif; font-size: 2rem; font-weight: 800; color: var(--ink); }
  .stat-summary-label { font-size: .72rem; color: var(--muted); margin-top: 2px; }
  .stat-top-list { list-style: none; }
  .stat-top-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .87rem; }
  .stat-top-item:last-child { border-bottom: none; }
  .stat-top-rank { font-weight: 700; color: var(--muted); min-width: 24px; }
  .stat-top-name { flex: 1; }
  .stat-top-cnt { font-weight: 700; color: var(--accent2); }
  .export-section { border-top: 1.5px solid var(--border); padding-top: 20px; }
  .export-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .export-row input[type=month] { padding: 8px 10px; border: 1.5px solid var(--border); background: var(--paper); font-size: .85rem; outline: none; }
  .export-btn { padding: 9px 18px; border: none; cursor: pointer; font-weight: 600; font-size: .85rem; color: #fff; }
  .export-btn.csv { background: #27ae60; }
  .export-btn.excel { background: var(--accent2); }
  .export-hint { font-size: .75rem; color: var(--muted); margin-top: 8px; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>관리자 로그인</h1>
    <p>상담 현황 관리 페이지입니다.</p>
    <input type="password" id="pw-input" placeholder="비밀번호" onkeydown="if(event.key==='Enter')window.doLogin()">
    <button onclick="window.doLogin()">로그인</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div id="app">
  <header>
    <h1>📋 상담 관리자</h1>
    <div style="display:flex;align-items:center;gap:16px">
      <span style="font-size:.8rem;color:#aaa" id="header-date"></span>
      <button class="logout-btn" style="margin-right:6px" onclick="window.openStatModal()">📊 통계/내보내기</button>
      <button class="logout-btn" style="margin-right:6px" onclick="document.getElementById('hist-overlay').classList.add('show')">🗂 학생 기록</button>
      <button class="logout-btn" onclick="window.doLogout()">로그아웃</button>
    </div>
  </header>

  <div class="main-wrap">
    <div class="cal-section">
      <div class="cal-nav">
        <button class="nav-btn" onclick="window.changeMonth(-1)">←</button>
        <h2 id="cal-title"></h2>
        <button class="nav-btn" onclick="window.changeMonth(1)">→</button>
      </div>
      <div class="calendar">
        <div class="cal-head">
          <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </div>

    <div class="side-panel">
      <!-- 슬롯 설정 -->
      <div class="panel-card">
        <h3 id="slot-title">날짜를 선택하세요</h3>
        <p class="panel-sub">상담 슬롯 개방/폐쇄 설정</p>
        <div id="slot-rows"><p class="no-date-msg">날짜를 선택하세요</p></div>

        <!-- 커스텀 슬롯 추가 폼 (선택 후 표시) -->
        <div class="add-slot-section" id="add-slot-section" style="display:none">
          <div class="add-slot-label">커스텀 슬롯 추가</div>
          <div class="add-slot-grid">
            <input class="add-slot-name" type="text" id="cs-name" placeholder="슬롯 이름 (예: 긴급상담)">
            <input type="text" id="cs-start" placeholder="시작 (예: 14:00)">
            <input type="text" id="cs-end" placeholder="종료 (예: 14:30)">
          </div>
          <button class="add-slot-btn" onclick="window.addCustomSlot()">+ 슬롯 추가</button>
        </div>
      </div>

      <!-- 예약 현황 -->
      <div class="panel-card">
        <h3>예약 현황</h3>
        <p class="panel-sub" id="booking-sub">선택한 날짜의 예약 목록</p>
        <div id="booking-list"><p class="no-date-msg">날짜를 선택하세요</p></div>
      </div>

      <!-- 비밀번호 변경 -->
      <div class="panel-card">
        <h3>비밀번호 변경</h3>
        <div class="pw-section">
          <input type="password" id="pw-cur" placeholder="현재 비밀번호">
          <input type="password" id="pw-new" placeholder="새 비밀번호">
          <button onclick="window.changePw()">변경하기</button>
          <div id="pw-msg" style="font-size:.75rem;margin-top:8px"></div>

<!-- 상담 기록 작성 모달 -->
<div class="rec-overlay" id="rec-overlay">
  <div class="rec-modal">

<!-- 학생 기록 조회 모달 -->
<div class="hist-overlay" id="hist-overlay" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="hist-modal">
    <div class="hist-modal-header">
      <h2>🗂 학생 상담 이력 조회</h2>

<!-- 오늘 상담 알림 모달 -->
<div class="today-overlay" id="today-overlay">
  <div class="today-modal">
    <div class="today-modal-header">
      <span style="font-size:1.4rem">🔔</span>
      <h2>오늘 상담이 있어요!</h2>
    </div>
    <div class="today-modal-body">
      <div class="today-date-label" id="today-date-label"></div>
      <div id="today-booking-list"></div>
    </div>
    <div class="today-modal-footer">
      <button class="today-goto-btn" id="today-goto-btn">오늘 날짜로 이동</button>
      <button class="today-close-btn" onclick="document.getElementById('today-overlay').classList.remove('show')">확인</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, collection, onSnapshot, setDoc, deleteDoc, getDoc, updateDoc, query, where, getDocs, orderBy }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDFGcLsVUPWrczjPyT4caEg1o7zdKGN-b8",
  authDomain: "my-counsel-9b532.firebaseapp.com",
  projectId: "my-counsel-9b532",
  storageBucket: "my-counsel-9b532.firebasestorage.app",
  messagingSenderId: "51705550332",
  appId: "1:51705550332:web:67766fdeb1214524190e79"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const FIXED_TIMES = { lunch: '12:40 – 13:00', after: '15:10 – 15:30' };
let slotsCache = {}, bookingsCache = {}, recordsCache = {}, adminPw = 'admin1234';
let curYear, curMonth, selectedDate = null;
let _slotsReady = false, _bookingsReady = false, _alertShown = false;

function maybeShowTodayAlert() {
  if (!_slotsReady || !_bookingsReady || _alertShown) return;
  _alertShown = true;

  const _d = new Date(); const today = `${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`;
  const books = bookingsCache[today] || [];
  if (!books.length) return;

  const slotData = slotsCache[today] || {};
  const customs  = slotData.custom || [];
  const FIXED_LABEL = { lunch: '점심 상담', after: '방과후 상담' };

  document.getElementById('today-date-label').textContent = `📅 ${today}`;

  const listEl = document.getElementById('today-booking-list');
  listEl.innerHTML = '';
  books.sort((a, b) => {
    const order = { lunch: 0, after: 1, custom: 2 };
    return (order[a.type] ?? 2) - (order[b.type] ?? 2);
  }).forEach(b => {
    let tagClass = b.type;
    let tagLabel = FIXED_LABEL[b.type] || '커스텀';
    let timeStr  = FIXED_TIMES[b.type] || '';
    if (b.type === 'custom') {
      const cs = customs[b.customIdx];
      if (cs) { tagLabel = cs.name; timeStr = `${cs.start} – ${cs.end}`; }
    }
    const item = document.createElement('div');
    item.className = 'today-booking-item';
    item.innerHTML = `
      <span class="today-slot-tag ${tagClass}">${tagLabel}</span>
      <div>
        <div class="today-booking-name">${b.name}</div>
        <div class="today-booking-time">${timeStr}</div>
      </div>
    `;
    listEl.appendChild(item);
  });

  document.getElementById('today-overlay').classList.add('show');
  document.getElementById('today-goto-btn').onclick = () => {
    document.getElementById('today-overlay').classList.remove('show');
    selectDate(today);
    // 달력을 오늘 달로 이동
    const [y, m] = today.split('-').map(Number);
    curYear = y; curMonth = m - 1;
    renderCal();
  };
}

// ── 로그인 ──
window.doLogin = async function() {
  const val = document.getElementById('pw-input').value;
  const snap = await getDoc(doc(db, 'settings', 'adminInfo'));
  if (snap.exists()) adminPw = snap.data().pw;
  if (val === adminPw) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    document.getElementById('login-err').textContent = '비밀번호가 틀렸습니다.';
  }
};

window.doLogout = () => location.reload();

// ── 앱 초기화 ──
function initApp() {
  const now = new Date();
  curYear = now.getFullYear();
  curMonth = now.getMonth();
  document.getElementById('header-date').textContent = now.toLocaleDateString('ko-KR');

  onSnapshot(collection(db, 'slots'), snap => {
    slotsCache = {};
    snap.forEach(d => slotsCache[d.id] = d.data());
    _slotsReady = true;
    renderCal();
    if (selectedDate) renderSlotPanel(selectedDate);
    maybeShowTodayAlert();
  });

  onSnapshot(collection(db, 'records'), snap => {
    recordsCache = {};
    snap.forEach(d => { recordsCache[d.id] = d.data(); });
    if (selectedDate) renderBookingPanel(selectedDate);
  });

  onSnapshot(collection(db, 'bookings'), snap => {
    bookingsCache = {};
    snap.forEach(d => {
      const b = d.data(); b.id = d.id;
      if (!bookingsCache[b.date]) bookingsCache[b.date] = [];
      bookingsCache[b.date].push(b);
    });
    _bookingsReady = true;
    renderCal();
    if (selectedDate) renderBookingPanel(selectedDate);
    maybeShowTodayAlert();
  });
}

// ── 달력 ──
window.changeMonth = (dir) => {
  curMonth += dir;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  else if (curMonth < 0) { curMonth = 11; curYear--; }
  renderCal();
};

function fmtDate(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function renderCal() {
  document.getElementById('cal-title').textContent = `${curYear}년 ${curMonth+1}월`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const firstDay = new Date(curYear, curMonth, 1).getDay();
  const lastDate = new Date(curYear, curMonth+1, 0).getDate();

  for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div class="cal-cell empty"></div>';

  for (let d = 1; d <= lastDate; d++) {
    const key = fmtDate(curYear, curMonth, d);
    const s = slotsCache[key] || {};
    const cell = document.createElement('div');
    cell.className = `cal-cell ${key === selectedDate ? 'selected' : ''}`;
    cell.onclick = () => selectDate(key);
    cell.innerHTML = `<div class="cell-date">${d}</div>`;
    if (s.lunch) cell.innerHTML += `<div class="slot-badge lunch-open"><span>점심</span></div>`;
    if (s.after)  cell.innerHTML += `<div class="slot-badge after-open"><span>방과후</span></div>`;
    // 커스텀 슬롯 뱃지
    const customs = s.custom || [];
    customs.filter(c => c.open).forEach(c => {
      cell.innerHTML += `<div class="slot-badge custom-open"><span>${c.name}</span></div>`;
    });
    grid.appendChild(cell);
  }
}

function selectDate(key) {
  selectedDate = key;
  renderCal();
  renderSlotPanel(key);
  renderBookingPanel(key);
  document.getElementById('add-slot-section').style.display = 'block';
}

// ── 슬롯 패널 ──
function renderSlotPanel(key) {
  const s = slotsCache[key] || { lunch: false, after: false, custom: [] };
  const books = bookingsCache[key] || [];
  document.getElementById('slot-title').textContent = key;
  const rows = document.getElementById('slot-rows');
  rows.innerHTML = '';

  // 고정 슬롯 (점심 / 방과후)
  ['lunch', 'after'].forEach(type => {
    const hasBook = books.some(b => b.type === type);
    const row = document.createElement('div');
    row.className = 'slot-row';
    row.innerHTML = `
      <div>
        <div class="slot-label ${type}">${type === 'lunch' ? '점심 상담' : '방과후 상담'}</div>
        <div class="slot-time">${FIXED_TIMES[type]}</div>
        ${hasBook ? '<div style="color:orange;font-size:11px">※ 예약 있음 (닫기 불가)</div>' : ''}
      </div>
      <label class="toggle">
        <input type="checkbox" ${s[type] ? 'checked' : ''} ${hasBook ? 'disabled' : ''}
          onchange="window.toggleSlot('${key}', '${type}', this.checked)">
        <span class="toggle-track"></span>
      </label>
    `;
    rows.appendChild(row);
  });

  // 커스텀 슬롯 목록
  const customs = s.custom || [];
  customs.forEach((c, idx) => {
    const hasBook = books.some(b => b.type === 'custom' && b.customIdx === idx);
    const row = document.createElement('div');
    row.className = 'custom-slot-row';
    row.innerHTML = `
      <div class="custom-slot-info">
        <div class="custom-slot-name">✦ ${c.name}</div>
        <div class="custom-slot-time">${c.start} – ${c.end}</div>
        ${hasBook ? '<div style="color:orange;font-size:11px">※ 예약 있음</div>' : ''}
      </div>
      <div class="custom-slot-actions">
        ${!hasBook ? `<button class="del-slot-btn" onclick="window.deleteCustomSlot('${key}', ${idx})">삭제</button>` : ''}
        <label class="toggle">
          <input type="checkbox" ${c.open ? 'checked' : ''} ${hasBook ? 'disabled' : ''}
            onchange="window.toggleCustomSlot('${key}', ${idx}, this.checked)">
          <span class="toggle-track"></span>
        </label>
      </div>
    `;
    rows.appendChild(row);
  });
}

// ── 슬롯 토글 (고정) ──
window.toggleSlot = async (date, type, val) => {
  await setDoc(doc(db, 'slots', date), { [type]: val }, { merge: true });
};

// ── 커스텀 슬롯 추가 ──
window.addCustomSlot = async () => {
  if (!selectedDate) return;
  const name  = document.getElementById('cs-name').value.trim();
  const start = document.getElementById('cs-start').value.trim();
  const end   = document.getElementById('cs-end').value.trim();

  if (!name) { alert('슬롯 이름을 입력하세요.'); return; }
  if (!start || !end) { alert('시작/종료 시간을 입력하세요.'); return; }

  const ref = doc(db, 'slots', selectedDate);
  const snap = await getDoc(ref);
  const existing = snap.exists() ? (snap.data().custom || []) : [];
  const newEntry = { name, start, end, open: true };
  await setDoc(ref, { custom: [...existing, newEntry] }, { merge: true });

  document.getElementById('cs-name').value = '';
  document.getElementById('cs-start').value = '';
  document.getElementById('cs-end').value = '';
};

// ── 커스텀 슬롯 토글 ──
window.toggleCustomSlot = async (date, idx, val) => {
  const ref = doc(db, 'slots', date);
  const snap = await getDoc(ref);
  if (!snap.exists()) return;
  const customs = snap.data().custom || [];
  customs[idx].open = val;
  await updateDoc(ref, { custom: customs });
};

// ── 커스텀 슬롯 삭제 ──
window.deleteCustomSlot = async (date, idx) => {
  if (!confirm('이 슬롯을 삭제할까요?')) return;
  const ref = doc(db, 'slots', date);
  const snap = await getDoc(ref);
  if (!snap.exists()) return;
  const customs = snap.data().custom || [];
  customs.splice(idx, 1);
  await updateDoc(ref, { custom: customs });
};

// ── 예약 패널 ──
function renderBookingPanel(key) {
  const books = bookingsCache[key] || [];
  const list = document.getElementById('booking-list');
  document.getElementById('booking-sub').textContent = `${key} 예약 목록`;
  list.innerHTML = '';

  if (!books.length) {
    list.innerHTML = '<p class="no-date-msg">예약이 없습니다.</p>';
    return;
  }

  const slotData = slotsCache[key] || {};
  const customs = slotData.custom || [];

  books.sort((a, b) => {
    const order = { lunch: 0, after: 1, custom: 2 };
    return (order[a.type] ?? 2) - (order[b.type] ?? 2);
  }).forEach(b => {
    const item = document.createElement('div');
    item.className = 'booking-item';

    let typeBadge = '';
    let slotName = '';
    if (b.type === 'lunch') {
      typeBadge = '<span class="b-type lunch">점심</span>';
    } else if (b.type === 'after') {
      typeBadge = '<span class="b-type after">방과후</span>';
    } else if (b.type === 'custom') {
      typeBadge = '<span class="b-type custom">커스텀</span>';
      const cs = customs[b.customIdx];
      if (cs) slotName = `<div class="b-slot">✦ ${cs.name} (${cs.start}–${cs.end})</div>`;
    }

    const hasRecord = Object.values(recordsCache).some(r => r.bookingId === b.id);
    item.innerHTML = `
      ${typeBadge}<span class="b-name">${b.name}</span>
      ${slotName}
      <div class="b-content">${b.content || ''}</div>
      <button class="b-record ${hasRecord ? 'b-has-record' : ''} " onclick="window.openRecordModal('${b.id}', '${b.name}', '${b.date}', '${b.type}')">기록 ${hasRecord ? '수정' : '작성'}</button>
      <button class="b-delete" onclick="window.deleteBooking('${b.id}')">삭제</button>
    `;
    list.appendChild(item);
  });
}

window.deleteBooking = async (id) => {
  if (confirm('이 예약을 삭제할까요? 학생 페이지에서도 사라집니다.')) {
    await deleteDoc(doc(db, 'bookings', id));
  }
};

// ── 비밀번호 변경 ──
window.changePw = async () => {
  const cur = document.getElementById('pw-cur').value;
  const n   = document.getElementById('pw-new').value;
  const msg = document.getElementById('pw-msg');
  if (cur !== adminPw) { msg.style.color = 'red'; msg.textContent = '현재 비밀번호가 틀립니다.'; return; }
  if (n.length < 4)    { msg.style.color = 'red'; msg.textContent = '4자 이상 입력하세요.'; return; }
  await setDoc(doc(db, 'settings', 'adminInfo'), { pw: n });
  adminPw = n;
  msg.style.color = 'green'; msg.textContent = '비밀번호가 변경되었습니다.';
};

// ── 상담 기록 ──
let _currentRecordBookingId = null;

window.openRecordModal = async (bookingId, name, date, type) => {
  _currentRecordBookingId = bookingId;
  const FIXED_LABEL = { lunch: '점심 상담', after: '방과후 상담', custom: '커스텀 상담' };
  document.getElementById('rec-info').textContent = `${date}  ${FIXED_LABEL[type] || type}  —  ${name}`;

  // 기존 기록 불러오기
  const existing = Object.values(recordsCache).find(r => r.bookingId === bookingId);
  document.getElementById('rec-content').value = existing?.content || '';
  document.getElementById('rec-private').value  = existing?.privateNote || '';
  document.getElementById('rec-overlay').classList.add('show');
};

window.saveRecord = async () => {
  const content     = document.getElementById('rec-content').value.trim();
  const privateNote = document.getElementById('rec-private').value.trim();
  if (!content) { alert('상담 내용을 입력하세요.'); return; }

  // 기존 기록 찾기 (같은 bookingId)
  const existingEntry = Object.entries(recordsCache).find(([, r]) => r.bookingId === _currentRecordBookingId);
  const ref = existingEntry
    ? doc(db, 'records', existingEntry[0])
    : doc(collection(db, 'records'));

  await setDoc(ref, {
    bookingId: _currentRecordBookingId,
    content,
    privateNote,
    updatedAt: Date.now()
  }, { merge: true });

  document.getElementById('rec-overlay').classList.remove('show');
};

// ── 학생 이력 조회 ──
window.searchHistory = async () => {
  const name = document.getElementById('hist-name-input').value.trim();
  if (!name) { alert('이름을 입력하세요.'); return; }

  const body = document.getElementById('hist-body');
  body.innerHTML = '<p class="hist-empty">조회 중...</p>';

  // bookings에서 이름 일치 항목 찾기
  const q = query(collection(db, 'bookings'), where('name', '==', name));
  const snap = await getDocs(q);

  if (snap.empty) {
    body.innerHTML = `<p class="hist-empty">${name} 학생의 상담 내역이 없습니다.</p>`;
    return;
  }

  // 날짜순 정렬
  const bookings = [];
  snap.forEach(d => bookings.push({ id: d.id, ...d.data() }));
  bookings.sort((a, b) => a.date > b.date ? -1 : 1);

  const FIXED_LABEL = { lunch: '점심 상담', after: '방과후 상담', custom: '커스텀 상담' };
  const FIXED_TIME  = { lunch: '12:40–13:00', after: '15:10–15:30' };

  body.innerHTML = '';
  for (const b of bookings) {
    const record = Object.values(recordsCache).find(r => r.bookingId === b.id);
    const slotInfo = slotsCache[b.date] || {};
    let typeLabel = FIXED_LABEL[b.type] || b.type;
    let timeStr   = FIXED_TIME[b.type] || '';
    if (b.type === 'custom') {
      const cs = (slotInfo.custom || [])[b.customIdx];
      if (cs) { typeLabel = cs.name; timeStr = `${cs.start}–${cs.end}`; }
    }

    const item = document.createElement('div');
    item.className = 'hist-item';
    item.innerHTML = `
      <div class="hist-item-header">
        <span class="hist-item-date">${b.date}</span>
        <span class="b-type ${b.type}">${typeLabel}</span>
        <span style="font-size:.75rem;color:var(--muted)">${timeStr}</span>
      </div>
      <div class="hist-item-body">
        ${b.content ? `<div class="hist-request-text">💬 신청 내용: ${b.content}</div>` : ''}
        ${record ? `
          <div class="hist-section-label">상담 기록</div>
          <div class="hist-section-text">${record.content}</div>
          ${record.privateNote ? `
            <div class="hist-private-box">
              <div class="hist-private-label">🔒 비공개 메모</div>
              <div class="hist-private-text">${record.privateNote}</div>
            </div>
          ` : ''}
        ` : '<div style="color:#bbb;font-size:.82rem">기록 없음</div>'}
      </div>
    `;
    body.appendChild(item);
  }
};

// ── 통계 & 내보내기 ──
let _statTab = 'overview';

window.openStatModal = () => {
  document.getElementById('stat-overlay').classList.add('show');
  renderStatTab('overview');
  // 탭 초기화
  document.querySelectorAll('.stat-tab').forEach((t,i) => t.classList.toggle('active', i===0));
};

window.switchStatTab = (tab, el) => {
  _statTab = tab;
  document.querySelectorAll('.stat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderStatTab(tab);
};

function getAllBookings() {
  const all = [];
  Object.values(bookingsCache).forEach(arr => arr.forEach(b => all.push(b)));
  return all.sort((a,b) => a.date < b.date ? -1 : 1);
}

function renderStatTab(tab) {
  const body = document.getElementById('stat-body');
  const all = getAllBookings();
  if (tab === 'overview') renderOverview(body, all);
  else if (tab === 'monthly') renderMonthly(body, all);
  else renderExport(body);
}

function renderOverview(body, all) {
  const total = all.length;
  const byType = { lunch: 0, after: 0, custom: 0 };
  const byName = {};
  all.forEach(b => {
    byType[b.type] = (byType[b.type] || 0) + 1;
    byName[b.name] = (byName[b.name] || 0) + 1;
  });
  const topStudents = Object.entries(byName).sort((a,b) => b[1]-a[1]).slice(0, 10);
  const maxCnt = topStudents[0]?.[1] || 1;
  const TYPE_LABEL = { lunch: '점심 상담', after: '방과후 상담', custom: '커스텀 상담' };

  body.innerHTML = `
    <div class="stat-section">
      <div class="stat-summary-grid">
        <div class="stat-summary-card">
          <div class="stat-summary-num">${total}</div>
          <div class="stat-summary-label">전체 상담 횟수</div>
        </div>
        <div class="stat-summary-card">
          <div class="stat-summary-num">${Object.keys(byName).length}</div>
          <div class="stat-summary-label">상담 학생 수</div>
        </div>
        <div class="stat-summary-card">
          <div class="stat-summary-num">${topStudents[0]?.[1] || 0}</div>
          <div class="stat-summary-label">최다 상담 횟수</div>
        </div>
      </div>
    </div>
    <div class="stat-section">
      <h4>슬롯 유형별 현황</h4>
      ${['lunch','after','custom'].map(t => `
        <div class="stat-row">
          <div class="stat-bar-label">${TYPE_LABEL[t]}</div>
          <div class="stat-bar-wrap"><div class="stat-bar ${t}" style="width:${total ? (byType[t]||0)/total*100 : 0}%"></div></div>
          <div class="stat-count">${byType[t]||0}회</div>
        </div>`).join('')}
    </div>
    <div class="stat-section">
      <h4>자주 온 학생 TOP 10</h4>
      <ul class="stat-top-list">
        ${topStudents.map(([name, cnt], i) => `
          <li class="stat-top-item">
            <span class="stat-top-rank">${i+1}</span>
            <span class="stat-top-name">${name}</span>
            <div class="stat-bar-wrap" style="max-width:160px"><div class="stat-bar total" style="width:${cnt/maxCnt*100}%"></div></div>
            <span class="stat-top-cnt">${cnt}회</span>
          </li>`).join('')}
        ${topStudents.length === 0 ? '<li class="stat-top-item" style="color:#bbb;justify-content:center">데이터 없음</li>' : ''}
      </ul>
    </div>
  `;
}

function renderMonthly(body, all) {
  // 월별 집계
  const monthly = {};
  all.forEach(b => {
    const ym = b.date.slice(0, 7);
    if (!monthly[ym]) monthly[ym] = { lunch:0, after:0, custom:0 };
    monthly[ym][b.type] = (monthly[ym][b.type] || 0) + 1;
  });
  const months = Object.keys(monthly).sort();
  const maxTotal = Math.max(...months.map(m => monthly[m].lunch + monthly[m].after + (monthly[m].custom||0)), 1);

  if (!months.length) {
    body.innerHTML = '<p class="hist-empty">데이터가 없습니다.</p>';
    return;
  }

  body.innerHTML = `
    <div class="stat-section">
      <h4>월별 상담 횟수</h4>
      ${months.slice().reverse().map(ym => {
        const d = monthly[ym];
        const total = d.lunch + d.after + (d.custom||0);
        return `
          <div class="stat-row">
            <div class="stat-bar-label">${ym}</div>
            <div class="stat-bar-wrap">
              <div style="display:flex;height:100%">
                <div style="width:${d.lunch/maxTotal*100}%;background:var(--lunch-accent)" title="점심 ${d.lunch}"></div>
                <div style="width:${d.after/maxTotal*100}%;background:var(--after-accent)" title="방과후 ${d.after}"></div>
                <div style="width:${(d.custom||0)/maxTotal*100}%;background:var(--custom-accent)" title="커스텀 ${d.custom||0}"></div>
              </div>
            </div>
            <div class="stat-count">${total}회</div>
          </div>`;
      }).join('')}
      <div style="display:flex;gap:16px;margin-top:14px;font-size:.75rem">
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:var(--lunch-accent);display:inline-block;border-radius:2px"></span>점심</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:var(--after-accent);display:inline-block;border-radius:2px"></span>방과후</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:var(--custom-accent);display:inline-block;border-radius:2px"></span>커스텀</span>
      </div>
    </div>
  `;
}

function renderExport(body) {
  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  body.innerHTML = `
    <div class="stat-section">
      <h4>상담 기록 내보내기</h4>
      <p style="font-size:.82rem;color:var(--muted);margin-bottom:16px">예약 정보 + 상담 기록을 CSV 파일로 저장합니다.<br>기간을 지정하거나 전체 내보내기가 가능합니다.</p>
      <div class="export-row">
        <span style="font-size:.82rem;font-weight:600">기간</span>
        <input type="month" id="exp-from" value="${thisMonth}">
        <span style="font-size:.82rem">~</span>
        <input type="month" id="exp-to" value="${thisMonth}">
        <button class="export-btn csv" onclick="window.exportCSV(false)">📥 기간 CSV</button>
      </div>
      <div class="export-row" style="margin-top:10px">
        <button class="export-btn excel" onclick="window.exportCSV(true)" style="background:var(--ink)">📥 전체 CSV</button>
      </div>
      <p class="export-hint">※ CSV는 엑셀에서 바로 열 수 있습니다. 비공개 메모 포함.</p>
    </div>
  `;
}

window.exportCSV = (allData) => {
  const all = getAllBookings();
  const FIXED_LABEL = { lunch: '점심 상담', after: '방과후 상담', custom: '커스텀 상담' };
  const FIXED_TIME  = { lunch: '12:40-13:00', after: '15:10-15:30' };

  let rows = all;
  if (!allData) {
    const from = document.getElementById('exp-from') ? document.getElementById('exp-from').value : '';
    const to   = document.getElementById('exp-to')   ? document.getElementById('exp-to').value   : '';
    if (from) rows = rows.filter(b => b.date.slice(0,7) >= from);
    if (to)   rows = rows.filter(b => b.date.slice(0,7) <= to);
  }

  if (!rows.length) { alert('해당 기간에 데이터가 없습니다.'); return; }

  const headers = ['날짜','슬롯','시간','학생이름','신청내용','상담기록','비공개메모'];
  const csvRows = [headers];

  rows.forEach(b => {
    const slotInfo = slotsCache[b.date] || {};
    let typeLabel = FIXED_LABEL[b.type] || b.type;
    let timeStr   = FIXED_TIME[b.type] || '';
    if (b.type === 'custom') {
      const cs = (slotInfo.custom || [])[b.customIdx];
      if (cs) { typeLabel = cs.name; timeStr = cs.start + '-' + cs.end; }
    }
    const rec = Object.values(recordsCache).find(r => r.bookingId === b.id);
    csvRows.push([
      b.date, typeLabel, timeStr, b.name,
      (b.content || '').replace(/\n/g, ' '),
      (rec ? rec.content || '' : '').replace(/\n/g, ' '),
      (rec ? rec.privateNote || '' : '').replace(/\n/g, ' ')
    ]);
  });

  const BOM = '\uFEFF';
  const lines = csvRows.map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(','));
  const csv = BOM + lines.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date();
  a.href = url;
  a.download = '상담기록_' + d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0') + '.csv';
  a.click();
  URL.revokeObjectURL(url);
};
