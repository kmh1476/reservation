<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>상담 관리자 모드</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; }
        .header-wrap { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); max-width: 800px; margin: 0 auto; background: white; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
        .day-header { padding: 10px; text-align: center; background: #f1f5f9; font-weight: bold; }
        .day-cell { height: 100px; border: 0.5px solid #e2e8f0; padding: 5px; }
        .slot-btn { width: 100%; padding: 5px; margin-top: 3px; font-size: 11px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: white; }
        /* 활성화 색상 명확하게 */
        .active-lunch { background: #14b8a6 !important; color: white !important; border-color: #0d9488 !important; }
        .active-after { background: #3b82f6 !important; color: white !important; border-color: #2563eb !important; }
        #loadingMsg { text-align: center; color: #666; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="loadingMsg">데이터를 불러오는 중...</div>
    <div class="header-wrap">
        <button onclick="changeMonth(-1)">◀</button>
        <h2 id="monthTitle"></h2>
        <button onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar-grid" id="calendar">
        <div class="day-header">일</div><div class="day-header">월</div><div class="day-header">화</div><div class="day-header">수</div><div class="day-header">목</div><div class="day-header">금</div><div class="day-header">토</div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx1PGyMAfi4ijJ9qZFGhBtJimTGWwRm0qtOuMv6sGsaQTazeGaNQE7clMNcI0VDlAJyOg/exec";
        let activeSlots = [];
        let currentDate = new Date();

        async function loadData() {
            document.getElementById('loadingMsg').innerText = "데이터 로딩 중...";
            try {
                const res = await fetch(`${SCRIPT_URL}?t=${Date.now()}`);
                activeSlots = await res.json();
                document.getElementById('loadingMsg').innerText = "✅ 로드 완료";
                setTimeout(() => document.getElementById('loadingMsg').innerText = "", 2000);
                render();
            } catch(e) {
                document.getElementById('loadingMsg').innerText = "❌ 로드 실패! 새로고침 해주세요.";
            }
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            render();
        }

        async function toggle(date, slot, btn) {
            // 버튼 상태 즉시 변경 (UI 반응성)
            const isActive = btn.classList.toggle(slot === '점심' ? 'active-lunch' : 'active-after');
            btn.innerText = isActive ? `✓ ${slot}` : slot;

            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({action: 'toggle', date, slot})
            });
            // 내부 데이터 동기화
            if(isActive) activeSlots.push({date, slot});
            else activeSlots = activeSlots.filter(s => !(s.date === date && s.slot === slot));
        }

        function render() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('monthTitle').innerText = `${year}년 ${month + 1}월`;
            const container = document.getElementById('calendar');
            while(container.children.length > 7) container.lastChild.remove();

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            for(let i=0; i<firstDay; i++) container.appendChild(document.createElement('div'));

            for(let d=1; d<=lastDate; d++) {
                const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                
                const hasLunch = activeSlots.some(s => s.date === dStr && s.slot === "점심");
                const hasAfter = activeSlots.some(s => s.date === dStr && s.slot === "방과후");

                cell.innerHTML = `
                    <div style="font-weight:bold">${d}</div>
                    <button class="slot-btn ${hasLunch?'active-lunch':''}" onclick="toggle('${dStr}','점심',this)">${hasLunch?'✓ 점심':'점심'}</button>
                    <button class="slot-btn ${hasAfter?'active-after':''}" onclick="toggle('${dStr}','방과후',this)">${hasAfter?'✓ 방과후':'방과후'}</button>
                `;
                container.appendChild(cell);
            }
        }
        loadData();
    </script>
</body>
</html>
